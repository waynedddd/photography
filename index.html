<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wayne — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'Space Mono', monospace;
    }

    body {
      background: #080808;
      color: #fff;
      font-family: var(--mono);
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── 3D Scene ─── */
    .scene {
      position: fixed;
      inset: 0;
      perspective: 1200px;
      perspective-origin: 50% 50%;
    }

    .carousel {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ─── Photo Cards ─── */
    .card {
      position: absolute;
      width: 280px;
      height: 380px;
      left: 50%;
      top: 50%;
      margin-left: -140px;
      margin-top: -190px;
      transform-style: preserve-3d;
      cursor: pointer;
      transition: filter 0.5s, opacity 0.5s;
    }

    .card-face {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: box-shadow 0.4s;
    }

    .card.active .card-face {
      box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.08);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card:hover img { transform: scale(1.06); }

    .card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 3rem 1.2rem 1.2rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.4s;
    }

    .card.active .card-label {
      opacity: 1;
      transform: translateY(0);
    }

    .card-label h3 {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-style: italic;
      font-weight: 400;
    }

    .card-label span {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-top: 0.3rem;
      display: block;
    }

    /* Non-active cards dim */
    .card:not(.active) {
      filter: brightness(0.4) saturate(0.3);
      opacity: 0.7;
    }

    /* ─── Header ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-style: italic;
    }

    header a {
      color: #fff;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.35;
      transition: opacity 0.3s;
    }
    header a:hover { opacity: 1; }

    /* ─── Bottom Info ─── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 2rem 3rem;
      pointer-events: none;
    }

    .photo-info {
      pointer-events: none;
    }

    .photo-info .num {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.25);
      margin-bottom: 0.5rem;
    }

    .photo-info .title {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-style: italic;
      font-weight: 400;
      line-height: 1.1;
      transition: opacity 0.4s;
    }

    .photo-info .meta {
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
      margin-top: 0.75rem;
      line-height: 1.8;
    }

    .photo-info .desc {
      font-family: var(--serif);
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      margin-top: 0.75rem;
      max-width: 360px;
      line-height: 1.6;
      font-weight: 400;
    }

    /* ─── Navigation ─── */
    .nav-arrows {
      pointer-events: auto;
      display: flex;
      gap: 0.75rem;
    }

    .nav-arrows button {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      color: rgba(255,255,255,0.5);
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-arrows button:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.3);
      color: #fff;
    }

    /* ─── Progress ─── */
    .progress {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 2px;
      background: rgba(255,255,255,0.5);
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 200;
    }

    /* ─── Keyboard hint ─── */
    .kb-hint {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      writing-mode: vertical-rl;
    }
    .kb-hint.left { left: 2rem; }
    .kb-hint.right { right: 2rem; }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      header { padding: 1.5rem; }
      .bottom-bar { padding: 1.5rem; flex-direction: column; align-items: flex-start; gap: 1.5rem; }
      .card { width: 220px; height: 300px; margin-left: -110px; margin-top: -150px; }
      .nav-arrows { align-self: flex-end; }
      .kb-hint { display: none; }
      .photo-info .desc { display: none; }
    }

    /* ─── Intro fade ─── */
    .scene, header, .bottom-bar, .kb-hint {
      opacity: 0;
      animation: fadeIn 1.2s 0.3s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">W.</div>
  <a href="mailto:wayne@example.com">Contact</a>
</header>

<div class="scene" id="scene">
  <div class="carousel" id="carousel"></div>
</div>

<div class="bottom-bar">
  <div class="photo-info">
    <div class="num" id="infoNum">01 / 12</div>
    <div class="title" id="infoTitle">Silent Peak</div>
    <div class="meta" id="infoMeta">Yunnan, 2025 · Fujifilm X-T5</div>
    <div class="desc" id="infoDesc">Morning mist clings to the mountain ridges like memory.</div>
  </div>
  <div class="nav-arrows">
    <button id="prev" aria-label="Previous">←</button>
    <button id="next" aria-label="Next">→</button>
  </div>
</div>

<div class="progress" id="progress"></div>

<div class="kb-hint left">← Prev</div>
<div class="kb-hint right">Next →</div>

<script>
const photos = [
  { url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=800&fit=crop', title: 'Silent Peak', location: 'Yunnan, 2025', camera: 'Fujifilm X-T5', desc: 'Morning mist clings to the mountain ridges like memory.' },
  { url: 'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=600&h=800&fit=crop', title: 'First Light', location: 'Guizhou, 2025', camera: 'Nikon FM2 · Portra 400', desc: 'The valley catches the first sunlight before the village wakes.' },
  { url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&h=800&fit=crop', title: 'Altitude', location: 'Tibet, 2024', camera: 'Fujifilm X-T5', desc: 'At 5,200 meters, the sky deepens into something almost black.' },
  { url: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&h=800&fit=crop', title: 'Canopy', location: 'Sichuan, 2024', camera: 'Ricoh GR IIIx', desc: 'Light falls through the canopy in columns, like a cathedral.' },
  { url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&h=800&fit=crop', title: 'Shore Lines', location: 'Hainan, 2024', camera: 'Fujifilm X-T5', desc: 'The tide writes and rewrites the same story every six hours.' },
  { url: 'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=600&h=800&fit=crop', title: 'After Dark', location: 'Qinghai, 2024', camera: 'Fujifilm X-T5 · 25s', desc: 'Drive three hours from any city to see this many stars.' },
  { url: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600&h=800&fit=crop', title: 'Still Waters', location: 'Jiuzhaigou, 2024', camera: 'Nikon FM2 · Ektar 100', desc: 'The lake holds the mountain so perfectly you forget which way is up.' },
  { url: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=600&h=800&fit=crop', title: 'Golden Hour', location: 'Inner Mongolia, 2024', camera: 'Fujifilm X-T5', desc: 'The grassland turns gold for exactly twenty minutes.' },
  { url: 'https://images.unsplash.com/photo-1518098268026-4e89f1a2cd8e?w=600&h=800&fit=crop', title: 'Tidal Memory', location: 'Fujian, 2024', camera: 'Ricoh GR IIIx', desc: "Fishermen's poles stand like notation in an ocean-sized score." },
  { url: 'https://images.unsplash.com/photo-1500534623283-312aade485b7?w=600&h=800&fit=crop', title: 'Fog', location: 'Anhui, 2024', camera: 'Fujifilm X-T5', desc: 'Huangshan in fog is less a mountain and more a suggestion.' },
  { url: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600&h=800&fit=crop', title: 'Between', location: 'Zhejiang, 2024', camera: 'Nikon FM2 · Portra 160', desc: 'Sun breaks through. Everything is backlit and borderless.' },
  { url: 'https://images.unsplash.com/photo-1446292532430-3e76f6ab6444?w=600&h=800&fit=crop', title: 'Solitude', location: 'Xinjiang, 2023', camera: 'Fujifilm X-T5', desc: 'A single road cutting through nothing. The most honest landscape.' }
];

const carousel = document.getElementById('carousel');
const total = photos.length;
const angleStep = 360 / total;
const radius = Math.max(450, total * 30); // Responsive radius
let current = 0;
let autoTimer;

// Build cards
photos.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card' + (i === 0 ? ' active' : '');
  card.dataset.index = i;

  const angle = angleStep * i;
  card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;

  card.innerHTML = `
    <div class="card-face">
      <img src="${p.url}" alt="${p.title}" loading="lazy">
      <div class="card-label">
        <h3>${p.title}</h3>
        <span>${p.location}</span>
      </div>
    </div>
  `;

  card.addEventListener('click', () => goTo(i));
  carousel.appendChild(card);
});

function goTo(index) {
  current = ((index % total) + total) % total;
  const rotation = -angleStep * current;
  carousel.style.transform = `translateZ(-${radius}px) rotateY(${rotation}deg)`;

  // Update active
  document.querySelectorAll('.card').forEach((c, i) => {
    c.classList.toggle('active', i === current);
  });

  // Update info
  const p = photos[current];
  document.getElementById('infoNum').textContent =
    `${String(current + 1).padStart(2, '0')} / ${total}`;
  document.getElementById('infoTitle').textContent = p.title;
  document.getElementById('infoMeta').textContent = `${p.location} · ${p.camera}`;
  document.getElementById('infoDesc').textContent = p.desc;

  // Progress
  document.getElementById('progress').style.width =
    `${((current + 1) / total) * 100}%`;

  resetAuto();
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

// Controls
document.getElementById('next').addEventListener('click', next);
document.getElementById('prev').addEventListener('click', prev);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx > 0 ? prev() : next();
});

// Mouse wheel
let wheelCooldown = false;
document.addEventListener('wheel', (e) => {
  if (wheelCooldown) return;
  wheelCooldown = true;
  setTimeout(() => wheelCooldown = false, 600);
  e.deltaY > 0 ? next() : prev();
}, { passive: true });

// Auto rotate
function resetAuto() {
  clearInterval(autoTimer);
  autoTimer = setInterval(next, 6000);
}

// Init
goTo(0);
</script>

</body>
</html>

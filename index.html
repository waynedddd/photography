<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wayne — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'Space Mono', monospace;
      --desk: #2a2420;
      --paper: #f5f0e8;
      --shadow: rgba(0,0,0,0.4);
    }

    body {
      background: var(--desk);
      overflow: hidden;
      cursor: grab;
      font-family: var(--mono);
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    /* subtle wood grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 3px,
          rgba(255,255,255,0.01) 3px,
          rgba(255,255,255,0.01) 4px
        );
      pointer-events: none;
      z-index: 0;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
    }

    .photo {
      position: absolute;
      background: var(--paper);
      padding: 12px 12px 40px 12px;
      box-shadow: 
        0 2px 8px var(--shadow),
        0 0 1px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.35s ease,
                  z-index 0s;
      transform-style: preserve-3d;
      perspective: 800px;
    }

    .photo:hover {
      box-shadow: 
        0 12px 40px rgba(0,0,0,0.5),
        0 0 1px rgba(0,0,0,0.2);
      z-index: 9000 !important;
    }

    .photo .front,
    .photo .back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .photo .front {
      display: block;
    }

    .photo .back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--paper);
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-align: center;
    }

    .photo.flipped {
      transform: rotateY(180deg) !important;
    }

    .photo img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    .photo .label {
      position: absolute;
      bottom: 10px;
      left: 12px;
      right: 12px;
      font-family: var(--mono);
      font-size: 9px;
      color: #999;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .back .title {
      font-family: var(--serif);
      font-size: 22px;
      color: #1a1a1a;
      margin-bottom: 8px;
      font-style: italic;
    }

    .back .meta {
      font-family: var(--mono);
      font-size: 10px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .back .desc {
      font-family: var(--serif);
      font-size: 14px;
      color: #444;
      line-height: 1.6;
      max-width: 200px;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 20px;
      pointer-events: none;
    }

    #lightbox.visible { display: flex; }
    #lightbox.active { pointer-events: auto; }

    #lb-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      cursor: zoom-out;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #lightbox.active #lb-backdrop { opacity: 1; }

    /* Flip card container */
    #lb-card {
      position: relative;
      z-index: 1;
      perspective: 1200px;
      cursor: pointer;
      /* fly-in: animated via JS */
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.4s ease;
    }

    #lb-card.flying {
      transition: none; /* disable during setup */
    }

    #lb-card-inner {
      position: relative;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
    }

    #lb-card.flipped #lb-card-inner {
      transform: rotateY(180deg);
    }

    /* Slide transitions for photo switching */
    #lb-card.slide-out-left {
      transition: transform 0.3s cubic-bezier(0.4, 0, 1, 1), opacity 0.25s ease;
      transform: translateX(-120px) scale(0.95);
      opacity: 0;
    }
    #lb-card.slide-out-right {
      transition: transform 0.3s cubic-bezier(0.4, 0, 1, 1), opacity 0.25s ease;
      transform: translateX(120px) scale(0.95);
      opacity: 0;
    }
    #lb-card.slide-in-left {
      transition: none;
      transform: translateX(80px) scale(0.97);
      opacity: 0;
    }
    #lb-card.slide-in-right {
      transition: none;
      transform: translateX(-80px) scale(0.97);
      opacity: 0;
    }
    #lb-card.slide-settle {
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
      transform: translateX(0) scale(1);
      opacity: 1;
    }

    #lb-front, #lb-back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    #lb-front img {
      display: block;
      max-width: 88vw;
      max-height: 65vh;
      object-fit: contain;
    }

    #lb-front .flip-hint {
      position: absolute;
      top: 50%;
      right: -40px;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.5px;
      writing-mode: vertical-rl;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    #lb-card:not(.flipped):hover .flip-hint { opacity: 1; }
    #lb-card.no-note .flip-hint { display: none; }

    #lb-back {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
      background: var(--paper);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 28px;
      overflow: hidden;
    }

    #lb-back .back-title {
      font-family: var(--serif);
      font-size: 22px;
      font-style: italic;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    #lb-back .back-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: #999;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    #lb-back .back-note {
      font-family: 'Caveat', cursive;
      font-size: 20px;
      color: #555;
      line-height: 1.6;
      max-width: 380px;
      text-align: center;
    }

    #lb-back .back-note .sig {
      display: block;
      margin-top: 12px;
      font-size: 17px;
      color: #aaa;
    }

    /* Info below the photo (front side) */
    #lightbox .info {
      text-align: center;
      color: #fff;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      cursor: zoom-out;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease 0.15s, transform 0.4s ease 0.15s;
    }

    #lightbox.active .info {
      opacity: 1;
      transform: translateY(0);
    }

    #lightbox .info .title {
      font-family: var(--serif);
      font-size: 28px;
      font-style: italic;
      margin-bottom: 6px;
    }

    #lightbox .info .meta {
      font-family: var(--mono);
      font-size: 11px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #lightbox .info .desc {
      font-family: var(--serif);
      font-size: 15px;
      color: #aaa;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* Hide info when flipped */
    #lb-card.flipped ~ .info { opacity: 0; pointer-events: none; }
    #lightbox .info { transition: opacity 0.3s; }

    @media (max-width: 768px) {
      #lb-front .flip-hint { display: none; }
      #lb-front img {
        max-width: 92vw;
        max-height: 55vh;
      }
      #lb-back .back-title,
      #lb-back .back-meta { display: none; }
      #lb-back {
        padding: 24px 20px;
      }
      #lb-back .back-note {
        font-size: 18px;
        max-width: 80vw;
        transform: rotate(-1.5deg);
      }
    }



    /* Minimap */
    #minimap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 160px;
      height: 100px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      z-index: 9999;
      overflow: hidden;
      cursor: pointer;
    }

    #minimap .viewport {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.05);
      pointer-events: none;
      transition: left 0.15s ease, top 0.15s ease;
    }

    #minimap .dot {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
    }

    /* Hint */
    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 1s ease;
      z-index: 9998;
    }

    @media (max-width: 768px) {
      .photo {
        padding: 6px 6px 24px 6px;
      }
      .photo .label {
        font-size: 7px;
        bottom: 6px;
        left: 6px;
      }
      #minimap {
        width: 90px;
        height: 56px;
        bottom: 12px;
        right: 12px;
      }
      #hint {
        font-size: 10px;
      }
      #lightbox {
        padding: 20px 12px;
        gap: 16px;
      }
      #lightbox img {
        max-width: 94vw;
        max-height: 55vh;
      }
      #lightbox .info .title {
        font-size: 20px;
      }
      #lightbox .info .desc {
        font-size: 13px;
        max-width: 85vw;
      }
    }

    /* Filter bar */
    #filters {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      z-index: 9998;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #filters .group {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }

    #filters .divider {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.15);
      margin: 0 6px;
    }

    .fbtn {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      padding: 5px 12px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.25s;
      border-radius: 0;
      white-space: nowrap;
    }

    .fbtn:hover {
      color: rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.3);
    }

    .fbtn.active {
      background: rgba(255,255,255,0.12);
      color: var(--paper);
      border-color: rgba(255,255,255,0.4);
    }

    .fbtn .emoji {
      margin-right: 4px;
    }

    /* Filtered-out photos */
    .photo.dimmed {
      opacity: 0 !important;
      pointer-events: none;
    }

    .photo.piled {
      transition: left 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                  top 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.4s ease,
                  filter 0.4s ease,
                  box-shadow 0.35s ease;
    }

    /* Pile counter */
    #pile-count {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      z-index: 9998;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    #pile-count.show { opacity: 1; }

    @media (max-width: 768px) {
      #filters {
        top: 12px;
        gap: 4px;
      }
      .fbtn {
        font-size: 8px;
        padding: 4px 8px;
      }
      #filters .divider {
        margin: 0 3px;
      }
    }
  </style>
</head>
<body>

<div id="filters">
  <div class="group" id="season-filters">
    <button class="fbtn" data-season="spring"><span class="emoji">🌸</span>Spring</button>
    <button class="fbtn" data-season="summer"><span class="emoji">☀️</span>Summer</button>
    <button class="fbtn" data-season="autumn"><span class="emoji">🍂</span>Autumn</button>
    <button class="fbtn" data-season="winter"><span class="emoji">❄️</span>Winter</button>
  </div>
  <div class="divider"></div>
  <div class="group" id="location-filters"></div>
</div>

<div id="pile-count"></div>

<div id="canvas"></div>

<div id="lightbox">
  <div id="lb-backdrop" onclick="closeLightbox()"></div>
  <div id="lb-card">
    <div id="lb-card-inner">
      <div id="lb-front">
        <img id="lb-img" src="" alt="">
        <div class="flip-hint">click to flip ↻</div>
      </div>
      <div id="lb-back">
        <div class="back-title" id="lb-back-title"></div>
        <div class="back-meta" id="lb-back-meta"></div>
        <div class="back-note" id="lb-back-note"></div>
      </div>
    </div>
  </div>
  <div class="info">
    <div class="title" id="lb-title"></div>
    <div class="meta" id="lb-meta"></div>
    <div class="desc" id="lb-desc"></div>
  </div>
</div>

<div id="minimap">
  <div class="viewport" id="mm-viewport"></div>
</div>

<div id="hint">drag to explore · click to view</div>

<script>
const photos = [
  // 2025-02 Haikou
  { url: 'photos/web/DSC01484_SnapseedCopy.jpg', title: 'Shadow Play', meta: 'Haikou, 2025 · Sony', desc: 'A small dog stepping through patches of afternoon light.', orient: 'h', date: '2025-02', note: 'The shadow is bigger than the dog. There\'s something comically heroic about that — this tiny creature casting a giant silhouette, strutting through the light like it owns the whole afternoon.' },
  { url: 'photos/web/DSC01464_SnapseedCopy.jpg', title: 'Shoreline', meta: 'Haikou, 2025 · Sony', desc: 'A man rides a horse on the beach, checking his phone.', orient: 'h', date: '2025-02', note: 'This is the 21st century in one frame. A man on horseback, scrolling. The horse doesn\'t care. The ocean doesn\'t care. Only the algorithm cares.' },
  { url: 'photos/web/DSC01433_SnapseedCopy.jpg', title: 'Market Day', meta: 'Haikou, 2025 · Sony', desc: 'Straw hats, fresh greens, and the hum of a morning market.', orient: 'h', date: '2025-02', note: 'You can almost smell this photo. Wet concrete, crushed herbs, diesel from the trucks. Markets like this are disappearing into supermarkets, but this one hasn\'t gotten the memo yet.' },
  { url: 'photos/web/DSC01418_SnapseedCopy.jpg', title: 'Spring Couplets', meta: 'Haikou, 2025 · Sony', desc: 'Red banners catch the sea wind. A woman walks past without looking.', orient: 'h', date: '2025-02', note: 'The couplets are shouting good fortune, but she\'s heard it all before. That\'s the thing about ritual — its power is in the repetition, not the attention.' },
  { url: 'photos/web/DSC01411_SnapseedCopy.jpg', title: 'Bone Setting', meta: 'Haikou, 2025 · Sony', desc: 'Traditional massage by the sea. Business is slow today.', orient: 'h', date: '2025-02', note: 'I love the patience in this scene. He\'s not anxious about the empty chairs. He\'s just there, by the sea, ready when someone needs him. A kind of grace that\'s hard to find now.' },
  { url: 'photos/web/DSC01393_SnapseedCopy.jpg', title: 'Waterfront', meta: 'Haikou, 2025 · Sony', desc: 'Fishermen lunch by the theme park. Nobody rides the coasters.', orient: 'h', date: '2025-02', note: 'The juxtaposition is almost too perfect — real labor next to manufactured fun, and the real thing wins. The coasters will rust before these fishermen stop coming here for lunch.' },
  { url: 'photos/web/DSC01385_SnapseedCopy.jpg', title: 'Unplayed', meta: 'Haikou, 2025 · Sony', desc: 'A white piano on dead grass. The church watches in silence.', orient: 'h', date: '2025-02', note: 'This stopped me cold. A grand piano, ornate and filthy, abandoned on dead grass in front of a Gothic church. It\'s a painting that accidentally happened in real life. Who put it here? Who walked away?' },
  { url: 'photos/web/DSC01301_SnapseedCopy.jpg', title: 'Blue Wall', meta: 'Haikou, 2025 · Sony', desc: 'A painted seagull on a sky-blue wall. Almost real.', orient: 'v', date: '2025-02', note: 'The painted bird will never leave this wall. There\'s a tenderness to that — someone wanted a seagull here permanently, even though real ones fly past every day.' },
  { url: 'photos/web/DSC01233_SnapseedCopy.jpg', title: 'Light Boxes', meta: 'Haikou, 2025 · Sony', desc: 'Two silhouettes pass the glowing billboards at night.', orient: 'h', date: '2025-02', note: 'The ads are louder than the people. That\'s the geometry of modern cities — we\'re always smaller than the things trying to sell to us. But these two just keep walking.' },
  { url: 'photos/web/IMG_1514.jpg', title: 'Red Stools', meta: 'Haikou, 2025 · iPhone', desc: 'Plastic chairs, old walls, and a lunch crowd that never left.', orient: 'v', date: '2025-02', note: 'Red plastic stools are the universal sign for "the food here is incredible and the decor is irrelevant." Trust the stools.' },
  { url: 'photos/web/IMG_1495.jpg', title: 'Cable Bridge', meta: 'Haikou, 2025 · iPhone', desc: 'The bridge at dusk, cables fanning out like a harp.', orient: 'h', date: '2025-02', note: 'Bridges always look their best at the hour when the sky can\'t decide if it\'s day or night. The cables are geometry pretending to be music.' },
  // Kyoto autumn
  { url: 'photos/web/DSCF9769.jpg', title: 'Nol', meta: 'Kyoto, 2024 · Fujifilm', desc: 'A noren curtain glows softly. The lantern says welcome without words.', orient: 'h', date: '2024-11', note: 'The warmth isn\'t from the light — it\'s from the restraint. One lantern, one curtain, and you already know exactly what kind of evening you\'re about to have.' },
  { url: 'photos/web/DSCF9700.jpg', title: 'Kyusu', meta: 'Kyoto, 2024 · Fujifilm', desc: 'A white teapot on wood. Nothing else needed.', orient: 'h', date: '2024-11', note: 'This is what good design looks like when nobody is trying to impress anyone. Just a teapot, just a counter, just enough light. The negative space is doing all the work.' },
  { url: 'photos/web/DSCF9651.jpg', title: 'Underpass', meta: 'Japan, 2024 · Fujifilm', desc: 'Two figures walk into a concrete underpass. Light cuts a sharp triangle on the wall.', orient: 'h', date: '2024-11', note: 'The triangle of light on the wall is so precise it looks designed. It wasn\'t. That\'s what makes great street photography — geometry hides everywhere, waiting for someone to notice.' },
  { url: 'photos/web/DSCF9649.jpg', title: 'Cyclist', meta: 'Japan, 2024 · Fujifilm', desc: 'A man cycles out of the underpass. His shadow stretches on the concrete wall.', orient: 'h', date: '2024-11', note: 'A companion to the underpass shot, but this one moves. The shadow is ten feet tall and riding ahead of him, like a future self he\'s chasing.' },
  { url: 'photos/web/DSCF9412.jpg', title: 'Golden Hour', meta: 'Nara, 2024 · Fujifilm', desc: 'Backlit at sunset. A girl walks through golden dust. Deer in the distance.', orient: 'v', date: '2024-11', note: 'The kind of light that makes you stop breathing for a second. She\'s walking through a Miyazaki frame and doesn\'t even know it. The deer in the background are extras who showed up on their own.' },
  { url: 'photos/web/DSCF9300.jpg', title: 'Autumn Canopy', meta: 'Kyoto, 2024 · Fujifilm', desc: 'Orange maple fills the frame. Branches weave like veins against the sky.', orient: 'h', date: '2024-11', note: 'Looking straight up into the canopy. It\'s a stained glass window made by a tree. In a week this will all be on the ground. That\'s what makes it beautiful.' },
  { url: 'photos/web/DSCF9284.jpg', title: 'Riverside', meta: 'Kyoto, 2024 · Fujifilm', desc: 'Red leaves hang over the river. A man walks the stone bank alone.', orient: 'h', date: '2024-11', note: 'Solitude doesn\'t always mean loneliness. This man chose to be here, on this bank, with these leaves. Sometimes the best company is a river that doesn\'t talk.' },
  { url: 'photos/web/DSCF9192.jpg', title: 'Three Riders', meta: 'Kyoto, 2024 · Fujifilm', desc: 'Cyclists cross under a blazing red tree. Tominokoji-dori in autumn.', orient: 'h', date: '2024-11', note: 'Three cyclists, three different speeds, one burning-red tree. The timing is perfect — a second later and this is just an empty street with a nice tree. But right now it\'s a story.' },
  { url: 'photos/web/DSCF9157.jpg', title: 'Counter', meta: 'Kyoto, 2024 · Fujifilm', desc: 'The chef serves dessert. Four women lean in. Warm light, warm scene.', orient: 'h', date: '2024-11', note: 'The lean. They\'re all leaning in at the same angle, drawn to whatever the chef just placed on the counter. That collective anticipation — you can feel it through the photo.' },
  { url: 'photos/web/DSCF9037.jpg', title: 'Bell Tower', meta: 'Kyoto, 2024 · Fujifilm', desc: 'A temple bell under blazing orange maple. Looking up at autumn.', orient: 'h', date: '2024-11', note: 'The bell has been there for centuries. The leaves have been there for weeks. One will outlast the other by a thousand years, but right now they\'re perfectly matched.' },
  { url: 'photos/web/DSCF8813.jpg', title: 'Moss Garden', meta: 'Kyoto, 2024 · Fujifilm', desc: 'Red maples over green moss. Bamboo behind. Light filters through.', orient: 'h', date: '2024-11', note: 'Red on green. The simplest color contrast in nature, but Kyoto stages it like an opera. Centuries of gardeners have made this look effortless.' },
  // Xinjiang & Korea
  { url: 'photos/web/DSCF6761.jpg', title: 'Naan Maker', meta: 'Xinjiang, 2024 · Fujifilm', desc: 'A young baker sits at his oven door. The naan is almost ready.', orient: 'h', date: '2024-08', note: 'He\'s young, maybe twenty. Already knows the oven by feel. His father probably sat in this exact spot. There\'s a whole lineage in the way he waits — not bored, just patient.' },
  { url: 'photos/web/DSCF6668.jpg', title: 'Night Fair', meta: 'Xinjiang, 2024 · Fujifilm', desc: 'Neon rides glow against black sky. A small-town carnival at the edge of the desert.', orient: 'h', date: '2024-08', note: 'Neon in the desert hits different. These lights are fighting the vastness of the night sky and losing, but beautifully. Every small town deserves a carnival this defiant.' },
  { url: 'photos/web/DSCF6593.jpg', title: 'Snow Mountains', meta: 'Pamir, 2024 · Fujifilm', desc: 'Last light hits the peaks. The lake holds its breath.', orient: 'h', date: '2024-08', note: 'The mountains are catching the last light while everything below has already surrendered to blue shadow. That band of gold on the peaks is maybe ten minutes long. You either see it or you don\'t.' },
  { url: 'photos/web/DSCF6446.jpg', title: 'Karakoram', meta: 'Pamir, 2024 · Fujifilm', desc: 'A road leads straight to Muztagh Ata. Snow peak, barren land, open sky.', orient: 'h', date: '2024-08', note: 'This is the photo that makes you want to drive and never stop. The road is absurdly straight, the mountain is absurdly big, and the scale makes every human concern feel absurdly small.' },
  { url: 'photos/web/DSCF6242.jpg', title: 'Blue Door', meta: 'Kashgar, 2024 · Fujifilm', desc: 'She draws on her tablet behind blue doors. A red carpet underneath.', orient: 'v', date: '2024-08', note: 'A girl with an iPad, in a centuries-old courtyard, drawing something none of us will see. The blue doors frame her like a Vermeer. Old city, new tools, same human impulse to create.' },
  { url: 'photos/web/DSCF6160.jpg', title: 'Balcony', meta: 'Kashgar, 2024 · Fujifilm', desc: 'Blue columns, patterned curtains, a man on the phone. Old city, same routine.', orient: 'h', date: '2024-08', note: 'The architecture is spectacular and he couldn\'t care less. He lives here. The carved columns are just where he leans when he takes a call. That gap between the tourist\'s awe and the local\'s boredom — that\'s the real subject.' },
  // Japan & Korea
  { url: 'photos/web/DSCF5736.jpg', title: 'Suwon', meta: 'Suwon, 2024 · Fujifilm', desc: 'The fortress wall curves through the city at dusk. Mountains behind mountains.', orient: 'h', date: '2024-09', note: 'The wall snakes through the modern city like a scar that healed into something beautiful. Layer after layer — wall, city, mountain, sky. Korea does depth like nobody else.' },
  { url: 'photos/web/DSCF5054.jpg', title: 'Wheel', meta: 'Japan, 2024 · Fujifilm', desc: 'A bicycle parked against old wood. Nobody is in a hurry.', orient: 'v', date: '2024-07', note: 'This bicycle has been parked here long enough to become furniture. The overgrown bush, the faded wood, the kickstand — everything says "I\'ll get to it later." Later never comes, and that\'s fine.' },
  { url: 'photos/web/DSCF4830.jpg', title: 'Cat Nap', meta: 'Japan, 2024 · Fujifilm', desc: 'Orange and white fur curled in a ball. The star of the shop.', orient: 'h', date: '2024-07', note: 'This cat has achieved what most of us can only dream of: being paid to sleep in public and having strangers adore you for it.' },
  { url: 'photos/web/DSCF4740.jpg', title: 'Crosswalk', meta: 'Japan, 2024 · Fujifilm', desc: 'Shadows and stripes. People flow past each other. Nobody looks up.', orient: 'h', date: '2024-07', note: 'The crosswalk stripes and the human shadows make a grid that\'s almost musical. Everyone is moving on their own track, in their own rhythm. It\'s choreography that nobody rehearsed.' },
  { url: 'photos/web/DSCF4620.jpg', title: 'Matsumoto', meta: 'Matsumoto, 2024 · Fujifilm', desc: 'A station attendant checks his phone on the platform. Summer afternoon.', orient: 'h', date: '2024-07', note: 'Even the station attendant gets bored. That\'s oddly comforting. Between the trains, between the announcements, there\'s just a man and his phone and the heavy air of a summer platform.' },
  { url: 'photos/web/DSCF4497.jpg', title: 'Pink Roof', meta: 'Japan, 2024 · Fujifilm', desc: 'Red tile roof, pink crepe myrtle, and a pine tree. A Japanese house in summer.', orient: 'h', date: '2024-07', note: 'The color palette of a Japanese residential street in summer is unbeatable. Tile red, flower pink, pine green, sky blue. No designer could improve this palette. Nature\'s already done the work.' },
  { url: 'photos/web/DSCF4394.jpg', title: 'No Photo', meta: 'Japan, 2024 · Fujifilm', desc: 'Flowers behind glass. No Photo, Don\'t Touch. The car reflects anyway.', orient: 'h', date: '2024-07', note: 'The irony of photographing a "No Photo" sign is a cliché, but this one earns it. The flowers don\'t know they\'re forbidden. The car reflection doesn\'t care about the rules. Everything leaks through.' },
  { url: 'photos/web/DSCF4128.jpg', title: 'Skylight', meta: 'Sapporo, 2024 · Fujifilm', desc: 'Looking up through the dome. Concrete grid, blue sky peeks through.', orient: 'v', date: '2024-02', note: 'Pure abstraction hiding in plain sight. If you didn\'t know this was architecture, you\'d think it was a painting — black geometry against soft blue. Tadao Ando would approve.' },
  { url: 'photos/web/DSCF3787.jpg', title: 'Rowing', meta: 'Hirosaki, 2024 · Fujifilm', desc: 'A couple rows under a canopy of cherry blossoms. The moat is still.', orient: 'h', date: '2024-04', note: 'They\'re surrounded. Above, below, in the reflection — blossoms everywhere. It\'s so saturated with spring that it almost feels unreal. But the slightly clumsy rowing makes it human.' },
  { url: 'photos/web/DSCF3655.jpg', title: 'Hanami', meta: 'Japan, 2024 · Fujifilm', desc: 'People linger under the blossoms. A girl looks through the white branches.', orient: 'h', date: '2024-04', note: 'Hanami is less about looking at flowers and more about being under them. The girl peering through the branches gets it — it\'s a ceiling made of petals, and you\'re inside.' },
  { url: 'photos/web/DSCF3422.jpg', title: 'Sakura Path', meta: 'Japan, 2024 · Fujifilm', desc: 'Cherry blossoms arch over a quiet path. Wooden fence, spring light.', orient: 'v', date: '2024-04', note: 'A tunnel of blossoms with nobody in it. That emptiness is the gift — most sakura photos are crowded. This one lets you imagine walking through alone, hearing nothing but petals falling.' },
  { url: 'photos/web/DSCF3146.jpg', title: 'Seagulls', meta: 'Japan, 2024 · Fujifilm', desc: 'Three gulls soar against blue sky and white clouds. Wings wide open.', orient: 'h', date: '2024-05', note: 'Three birds, three different wing positions, frozen mid-flight against that impossible blue. It\'s the simplest possible composition and it\'s perfect. Sometimes the camera just needs to look up.' },
  { url: 'photos/web/DSCF2206.jpg', title: 'Red Cardigan', meta: 'Portland, 2024 · Fujifilm', desc: 'A woman in a red cardigan stands under cherry blossoms. Spring on the front steps.', orient: 'v', date: '2024-04', note: 'The red cardigan against the pink blossoms — she dressed for this without trying. Portland does spring quietly, on front porches, without the festival crowds. It\'s more intimate this way.' },
  { url: 'photos/web/DSCF2153.jpg', title: 'Window', meta: 'Japan, 2024 · Fujifilm', desc: 'Cherry blossoms and a statue reflected in glass. Spring seen through a window.', orient: 'h', date: '2024-04', note: 'A double exposure that happened in real life. The window holds the blossoms and the statue simultaneously, layering two seasons of beauty into one pane of glass.' },
  { url: 'photos/web/DSCF2105.jpg', title: 'Blossom Street', meta: 'Portland, 2024 · Fujifilm', desc: 'A cyclist stops under cherry blossoms. Speed limit 20, cars parked on both sides.', orient: 'h', date: '2024-04', note: 'Speed limit 20, but who\'s counting? The cyclist stopped because the canopy demanded it. Some streets are so beautiful they function as speed bumps.' },
  { url: 'photos/web/DSCF1539.jpg', title: 'Ski Hill', meta: 'Hokkaido, 2024 · Fujifilm', desc: 'A building on a snowy hillside. Bare trees, overcast sky. People trek up the slope.', orient: 'h', date: '2024-12', note: 'The determined trudge uphill through deep snow. No ski lift here — you earn the descent. The overcast sky flattens everything into shades of white and grey. It\'s almost monochrome.' },
  { url: 'photos/web/DSCF1462.jpg', title: 'Head Buddha', meta: 'Sapporo, 2024 · Fujifilm', desc: 'Snow-covered hill, a concrete arch entrance. The Buddha hides inside the dome.', orient: 'h', date: '2024-12', note: 'Tadao Ando buried a 13-meter Buddha inside a hill of lavender. In winter, the lavender is snow, and the entrance looks like a portal to another world. It kind of is.' },
  { url: 'photos/web/DSCF1455.jpg', title: 'Atama Daibutsu', meta: 'Sapporo, 2024 · Fujifilm', desc: 'The Buddha rises against blue sky through the oculus. Concrete petals frame the view.', orient: 'h', date: '2024-12', note: 'You walk through a dark corridor and then — the head appears against blue sky, framed by concrete folds. Ando designed the approach so you\'d gasp. It works every time.' },
  { url: 'photos/web/DSCF1332.jpg', title: 'Snow Beach', meta: 'Hokkaido, 2024 · Fujifilm', desc: 'Dark sand meets snow. Wind turbines on the horizon. Winter coast.', orient: 'h', date: '2024-12', note: 'Black sand, white snow, grey sea. Hokkaido\'s winter coast is a study in desaturation. The wind turbines are the only vertical lines in a landscape that wants to be flat forever.' },
  { url: 'photos/web/DSCF1209.jpg', title: 'Zenibako', meta: 'Hokkaido, 2024 · Fujifilm', desc: 'A small JR station in deep snow. Zenibako, between Hoshimi and Asari.', orient: 'h', date: '2024-12', note: 'A station so small and so buried in snow that it feels like a secret. The sign says Zenibako. The snow says good luck getting anywhere. Japanese infrastructure persists anyway.' },
  { url: 'photos/web/DSCF1170.jpg', title: 'Twilight', meta: 'Otaru, 2024 · Fujifilm', desc: 'Snowy street at dusk. Taillights glow red. The sea waits at the bottom of the hill.', orient: 'v', date: '2024-12', note: 'This is the photo I keep coming back to. The red taillights bleeding on wet snow, the hill falling toward an invisible sea, the blue hour pressing down. It\'s cold and warm at the same time.' },
  { url: 'photos/web/DSCF1055.jpg', title: 'Snowfall', meta: 'Otaru, 2024 · Fujifilm', desc: 'Two girls in the snow. Blue scarf, orange scarf. Otaru post office behind.', orient: 'h', date: '2024-12', note: 'The color coordination is almost too good — blue scarf and orange scarf, like they planned to be complementary colors in a snowstorm. They didn\'t. The camera just got lucky.' },
  { url: 'photos/web/DSCF1016.jpg', title: 'Folk Craft', meta: 'Otaru, 2024 · Fujifilm', desc: 'A kilim rug banner on a shutter. Two people walk past in heavy snow. December 3.', orient: 'h', date: '2024-12', note: 'A handwoven banner surviving a Hokkaido blizzard. The people are bundled past recognition. But the banner just hangs there, defiant and colorful against all that white. Craft endures.' },
  { url: 'photos/web/IMG_5783.jpg', title: 'Tunnel', meta: 'Japan, 2024 · iPhone', desc: 'A man walks out of a dark tunnel into open farmland. Light at the end.', orient: 'h', date: '2024-03', note: 'The metaphor is obvious and it doesn\'t matter. Walking from dark to light is walking from dark to light. Sometimes a photo works because the feeling is universal, not clever.' },
  { url: 'photos/web/IMG_2600.jpg', title: 'Wetland', meta: 'Tibet, 2024 · iPhone', desc: 'Mountains reflected in marsh water. Golden grass stretches to the horizon.', orient: 'h', date: '2024-10', note: 'Tibet at golden hour. The mountains in the water are sharper than the real ones. The grass is electric. An iPhone captured this — proof that the light does all the heavy lifting.' },
  // 2025-01
  { url: 'photos/web/DSCF4749.jpg', title: 'Intersection', meta: 'Tokyo, 2025 · Fujifilm', desc: 'A delivery rider threads between a bus and a taxi.', orient: 'h', date: '2025-01', note: 'Tokyo traffic is a negotiation measured in centimeters. This rider found the gap. In two seconds it\'ll close. Street photography and delivery driving require the same instinct.' },
  { url: 'photos/web/DSCF4527.jpg', title: 'The Cook', meta: 'Japan, 2025 · Fujifilm', desc: 'Wooden bowls, hung spoons, and a quiet man behind the counter.', orient: 'h', date: '2025-01', note: 'The tools tell the story before the man does. Wooden spoons hung in a row, each one worn to a different curve. He\'s cooked thousands of meals in this small space. The stillness is earned.' },
  { url: 'photos/web/DSC00875.jpg', title: 'Waiting', meta: 'China, 2025 · Sony', desc: 'A man sits between two electrical boxes like a portrait.', orient: 'h', date: '2025-01', note: 'The two boxes frame him perfectly, like a throne he didn\'t choose. Street furniture creates accidental portraits all the time — you just have to see the frame the city already built.' },
  { url: 'photos/web/DSC00853.jpg', title: 'Passage', meta: 'China, 2025 · Sony', desc: 'Figures move through the covered walkway, umbrellas folded.', orient: 'h', date: '2025-01', note: 'The covered walkway is an in-between space — not inside, not outside. People move through it without lingering. It\'s architecture designed to be forgotten, which makes it interesting.' },
  // 2024-12
  { url: 'photos/web/IMG_1452.jpg', title: 'Poster Wall', meta: 'Shanghai, 2024 · iPhone', desc: 'Workers chat in front of a wall of design posters.', orient: 'h', date: '2024-12', note: 'The irony of workers in hard hats chatting in front of art posters. Design talks about the future; they\'re building it. Two parallel conversations about the same thing.' },
  { url: 'photos/web/IMG_1453.jpg', title: 'Café Window', meta: 'Shanghai, 2024 · iPhone', desc: 'Polka dots on glass, a man scrolls through his phone.', orient: 'h', date: '2024-12', note: 'The polka dots on the glass turn him into a pattern. He\'s scrolling, unaware that from outside he\'s become part of the café\'s decoration. We\'re all someone else\'s background.' },
  { url: 'photos/web/DSC00643.jpg', title: 'Dusk', meta: 'China, 2024 · Sony', desc: 'The city softens. Everything turns the same shade of blue.', orient: 'h', date: '2024-12', note: 'That ten-minute window when the city holds its breath. Daylight\'s gone, streetlights are warming up, and everything shares one blue. It\'s the most democratic light — it treats every building the same.' },
  { url: 'photos/web/DSC00375.jpg', title: 'Fog Season', meta: 'China, 2024 · Sony', desc: 'Trees vanish into the mist. Depth becomes a guess.', orient: 'h', date: '2024-12', note: 'Fog is nature\'s eraser. It takes a landscape and removes information until only the closest things remain real. Everything else is memory and suggestion.' },
  { url: 'photos/web/DSC00208.jpg', title: 'Night Walk', meta: 'China, 2024 · Sony', desc: 'Street lights draw long shadows. The city is still awake.', orient: 'h', date: '2024-12', note: 'Night walking is underrated. The city reveals its skeleton after dark — the infrastructure, the light cones, the shadows that never exist during the day. A different city wearing the same streets.' }
];

// --- Layout: scatter photos on a large canvas ---
const isMobile = window.innerWidth <= 768;
const PHOTO_W_H = isMobile ? 160 : 240;
const PHOTO_W_V = isMobile ? 110 : 170;
const COLS = Math.ceil(Math.sqrt(photos.length * (isMobile ? 2.2 : 1.8)));
const CELL = isMobile ? 170 : 260;  // moderate overlap
const CANVAS_W = COLS * CELL + 400;
const CANVAS_H = Math.ceil(photos.length / COLS) * CELL + 400;
const canvas = document.getElementById('canvas');
canvas.style.width = CANVAS_W + 'px';
canvas.style.height = CANVAS_H + 'px';

// Seeded random for consistent layout
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return s / 2147483647;
  };
}
const rand = seededRandom(42);

// Shuffle photos for visual variety
const shuffled = [...photos].sort(() => rand() - 0.5);

shuffled.forEach((p, i) => {
  const col = i % COLS;
  const row = Math.floor(i / COLS);
  // Size variation: deterministic pattern to spread sizes evenly
  const sizePattern = [1.0, 0.8, 1.25, 0.8, 1.0, 1.25, 0.8, 1.0, 0.8, 1.25, 1.0, 1.25];
  const sizeMult = sizePattern[i % sizePattern.length];
  const baseW = p.orient === 'v' ? PHOTO_W_V : PHOTO_W_H;
  const w = Math.round(baseW * sizeMult);
  const rotation = (rand() - 0.5) * (isMobile ? 8 : 12); // subtler on mobile
  const offsetX = (rand() - 0.5) * (isMobile ? 40 : 60);
  const offsetY = (rand() - 0.5) * (isMobile ? 40 : 60);
  const x = 200 + col * CELL + offsetX;
  const y = 200 + row * CELL + offsetY;
  const z = Math.floor(rand() * 100);

  const el = document.createElement('div');
  el.className = 'photo';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = w + 'px';
  el.style.zIndex = z;
  el.style.transform = `rotate(${rotation}deg)`;
  el.dataset.rotation = rotation;
  el.dataset.idx = i;

  el.innerHTML = `
    <div class="front">
      <img src="${p.url}" alt="${p.title}" loading="lazy">
      <div class="label">${p.title} — ${p.meta}</div>
    </div>
  `;

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    openLightbox(photos.indexOf(p), null, el);
  });

  // Bring to front on hover
  let hoverZ = 9000;
  el.addEventListener('mouseenter', () => {
    hoverZ++;
    el.style.zIndex = hoverZ;
    el.style.transform = `rotate(0deg) scale(1.15) translateY(-8px)`;
    el.style.boxShadow = '0 20px 60px rgba(0,0,0,0.6), 0 0 1px rgba(0,0,0,0.2)';
  });
  el.addEventListener('mouseleave', () => {
    el.style.zIndex = hoverZ; // stays on top once touched
    el.style.transform = `rotate(${rotation}deg)`;
    el.style.boxShadow = '';
  });

  canvas.appendChild(el);
});

// --- Pan (drag to explore) ---
let isPanning = false;
let startX, startY, panX = 0, panY = 0;

// Center the view initially
const vw = window.innerWidth;
const vh = window.innerHeight;
panX = -(CANVAS_W / 2 - vw / 2);
panY = -(CANVAS_H / 2 - vh / 2);
canvas.style.transform = `translate(${panX}px, ${panY}px)`;

document.body.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.photo') || e.target.closest('#lightbox') || e.target.closest('#minimap')) return;
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
  document.body.style.cursor = 'grabbing';
});

document.body.addEventListener('pointermove', (e) => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  canvas.style.transform = `translate(${panX}px, ${panY}px)`;
  updateMinimap();

  // Hide hint on first drag
  const hint = document.getElementById('hint');
  if (hint) hint.style.opacity = '0';
});

document.body.addEventListener('pointerup', () => {
  isPanning = false;
  document.body.style.cursor = 'grab';
});

// Two-finger trackpad / mouse wheel to pan
document.body.addEventListener('wheel', (e) => {
  if (e.target.closest('#lightbox') || e.target.closest('#minimap') || e.target.closest('#filters')) return;
  e.preventDefault();
  panX -= e.deltaX;
  panY -= e.deltaY;
  canvas.style.transform = `translate(${panX}px, ${panY}px)`;
  updateMinimap();
  const hint = document.getElementById('hint');
  if (hint) hint.style.opacity = '0';
}, { passive: false });

// Touch: also allow dragging from photos
let touchStart = null;
document.body.addEventListener('touchstart', (e) => {
  if (e.target.closest('#lightbox') || e.target.closest('#minimap')) return;
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, px: panX, py: panY };
  }
}, { passive: true });

document.body.addEventListener('touchmove', (e) => {
  if (!touchStart || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  // If moved enough, it's a pan not a tap
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
    touchStart.moved = true;
    panX = touchStart.px + dx;
    panY = touchStart.py + dy;
    canvas.style.transform = `translate(${panX}px, ${panY}px)`;
    updateMinimap();
    const hint = document.getElementById('hint');
    if (hint) hint.style.opacity = '0';
  }
}, { passive: true });

document.body.addEventListener('touchend', (e) => {
  if (touchStart && !touchStart.moved) {
    // It was a tap — find the photo under the tap
    const el = document.elementFromPoint(touchStart.x, touchStart.y);
    const photoEl = el && el.closest('.photo');
    if (photoEl) {
      const idx = parseInt(photoEl.dataset.idx);
      openLightbox(photos.indexOf(shuffled[idx]), null, photoEl);
    }
  }
  touchStart = null;
});

// --- Lightbox ---
let currentLB = -1;
let sourcePhotoEl = null; // the .photo element that was clicked
let isAnimating = false;

function getPhotoElByIdx(idx) {
  // find the .photo element whose shuffled photo matches photos[idx]
  const photoEls = document.querySelectorAll('.photo');
  for (const el of photoEls) {
    const si = parseInt(el.dataset.idx);
    if (shuffled[si] === photos[idx]) return el;
  }
  return null;
}

function openLightbox(idx, direction, clickedEl) {
  if (isAnimating) return;

  const isSwitch = currentLB >= 0; // switching between photos
  currentLB = idx;
  const p = photos[idx];
  const lb = document.getElementById('lightbox');
  const card = document.getElementById('lb-card');

  // If switching (left/right), do slide animation
  if (isSwitch && direction) {
    isAnimating = true;
    const outClass = direction === 'left' ? 'slide-out-left' : 'slide-out-right';
    const inClass = direction === 'left' ? 'slide-in-left' : 'slide-in-right';

    card.classList.remove('slide-settle', 'slide-in-left', 'slide-in-right');
    card.classList.add(outClass);

    setTimeout(() => {
      // Update content while invisible
      updateLightboxContent(p, card);
      card.classList.remove(outClass);
      card.classList.add(inClass);
      // Force reflow
      void card.offsetWidth;
      requestAnimationFrame(() => {
        card.classList.remove(inClass);
        card.classList.add('slide-settle');
        isAnimating = false;
      });
    }, 280);

    // Update info with fade
    const info = lb.querySelector('.info');
    info.style.opacity = '0';
    info.style.transform = 'translateY(12px)';
    setTimeout(() => {
      updateLightboxInfo(p);
      info.style.opacity = '';
      info.style.transform = '';
    }, 300);

    return;
  }

  // Fresh open — fly from source photo
  if (clickedEl) sourcePhotoEl = clickedEl;
  else sourcePhotoEl = getPhotoElByIdx(idx);

  updateLightboxContent(p, card);
  updateLightboxInfo(p);

  lb.classList.add('visible');

  if (sourcePhotoEl) {
    // Get source rect in viewport coords
    const srcRect = sourcePhotoEl.getBoundingClientRect();
    const srcCX = srcRect.left + srcRect.width / 2;
    const srcCY = srcRect.top + srcRect.height / 2;
    const destCX = window.innerWidth / 2;
    const destCY = window.innerHeight / 2;
    const dx = srcCX - destCX;
    const dy = srcCY - destCY;
    const srcScale = Math.min(srcRect.width / 400, srcRect.height / 300, 0.4);

    // Get source rotation
    const rot = parseFloat(sourcePhotoEl.dataset.rotation) || 0;

    card.classList.add('flying');
    card.style.transform = `translate(${dx}px, ${dy}px) scale(${srcScale}) rotate(${rot}deg)`;
    card.style.opacity = '0.7';

    void card.offsetWidth; // force reflow

    card.classList.remove('flying');
    card.style.transform = '';
    card.style.opacity = '';
  }

  requestAnimationFrame(() => {
    lb.classList.add('active');
  });
}

function updateLightboxContent(p, card) {
  card.classList.remove('flipped');
  document.getElementById('lb-img').src = p.url;
  document.getElementById('lb-back-title').textContent = p.title;
  document.getElementById('lb-back-meta').textContent = p.meta;
  const noteEl = document.getElementById('lb-back-note');
  if (p.note) {
    noteEl.innerHTML = p.note + '<span class="sig">— Kit</span>';
    card.classList.remove('no-note');
  } else {
    noteEl.innerHTML = '';
    card.classList.add('no-note');
  }
}

function updateLightboxInfo(p) {
  document.getElementById('lb-title').textContent = p.title;
  document.getElementById('lb-meta').textContent = p.meta;
  document.getElementById('lb-desc').textContent = p.desc;
}

function toggleFlip(e) {
  if (e) e.stopPropagation();
  const card = document.getElementById('lb-card');
  if (card.classList.contains('no-note')) return;
  card.classList.toggle('flipped');
}

// Click card to flip (works on both desktop and mobile)
document.getElementById('lb-card').addEventListener('click', (e) => {
  e.stopPropagation();
  toggleFlip(e);
});

// Desktop: click info area to close
document.querySelector('#lightbox .info').addEventListener('click', (e) => {
  closeLightbox();
});

// Card swipe to navigate (mobile)
let cardTouchX = 0;
const cardEl = document.getElementById('lb-card');
cardEl.addEventListener('touchstart', (e) => {
  cardTouchX = e.touches[0].clientX;
}, { passive: true });
cardEl.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - cardTouchX;
  if (Math.abs(dx) > 50) {
    e.preventDefault();
    if (dx < 0) openLightbox((currentLB + 1) % photos.length, 'left');
    else openLightbox((currentLB - 1 + photos.length) % photos.length, 'right');
  }
});

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  const card = document.getElementById('lb-card');

  // Fly back to source
  if (sourcePhotoEl) {
    const srcRect = sourcePhotoEl.getBoundingClientRect();
    const srcCX = srcRect.left + srcRect.width / 2;
    const srcCY = srcRect.top + srcRect.height / 2;
    const destCX = window.innerWidth / 2;
    const destCY = window.innerHeight / 2;
    const dx = srcCX - destCX;
    const dy = srcCY - destCY;
    const srcScale = Math.min(srcRect.width / 400, srcRect.height / 300, 0.4);
    const rot = parseFloat(sourcePhotoEl.dataset.rotation) || 0;

    card.style.transform = `translate(${dx}px, ${dy}px) scale(${srcScale}) rotate(${rot}deg)`;
    card.style.opacity = '0';
  }

  lb.classList.remove('active');
  setTimeout(() => {
    lb.classList.remove('visible');
    card.style.transform = '';
    card.style.opacity = '';
    card.classList.remove('slide-settle', 'slide-out-left', 'slide-out-right', 'slide-in-left', 'slide-in-right');
  }, 500);
  currentLB = -1;
  sourcePhotoEl = null;
}

// Arrow keys in lightbox
document.addEventListener('keydown', (e) => {
  if (currentLB < 0) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') {
    openLightbox((currentLB + 1) % photos.length, 'left');
  }
  if (e.key === 'ArrowLeft') {
    openLightbox((currentLB - 1 + photos.length) % photos.length, 'right');
  }
});

// Lightbox swipe (mobile)
let lbTouchX = 0, lbTouchY = 0;
const lbEl = document.getElementById('lightbox');
lbEl.addEventListener('touchstart', (e) => {
  lbTouchX = e.touches[0].clientX;
  lbTouchY = e.touches[0].clientY;
}, { passive: true });
lbEl.addEventListener('touchend', (e) => {
  if (e.target.closest('#lb-card')) return;
  const dx = e.changedTouches[0].clientX - lbTouchX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) openLightbox((currentLB + 1) % photos.length, 'left');
    else openLightbox((currentLB - 1 + photos.length) % photos.length, 'right');
  } else if (Math.abs(dx) < 10) {
    closeLightbox();
  }
});

// --- Minimap ---
function updateMinimap() {
  const vp = document.getElementById('mm-viewport');
  const mm = document.getElementById('minimap');
  const mmW = mm.offsetWidth;
  const mmH = mm.offsetHeight;
  const scaleX = mmW / CANVAS_W;
  const scaleY = mmH / CANVAS_H;

  const vpW = vw * scaleX;
  const vpH = vh * scaleY;
  const vpX = -panX * scaleX;
  const vpY = -panY * scaleY;

  vp.style.left = vpX + 'px';
  vp.style.top = vpY + 'px';
  vp.style.width = vpW + 'px';
  vp.style.height = vpH + 'px';
}

// Draw dots on minimap
function initMinimap() {
  const mm = document.getElementById('minimap');
  const scaleX = mm.offsetWidth / CANVAS_W;
  const scaleY = mm.offsetHeight / CANVAS_H;

  document.querySelectorAll('.photo').forEach(el => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.left = (parseFloat(el.style.left) + 50) * scaleX + 'px';
    dot.style.top = (parseFloat(el.style.top) + 30) * scaleY + 'px';
    mm.appendChild(dot);
  });

  updateMinimap();
}

// Fade hint after 4s
setTimeout(() => {
  const hint = document.getElementById('hint');
  if (hint) hint.style.opacity = '0';
}, 4000);

initMinimap();

// --- Minimap click/drag to navigate ---
const mmEl = document.getElementById('minimap');
let mmDragging = false;

function mmNavigate(clientX, clientY) {
  const rect = mmEl.getBoundingClientRect();
  const mx = clientX - rect.left;
  const my = clientY - rect.top;
  const mmW = mmEl.offsetWidth;
  const mmH = mmEl.offsetHeight;
  // Convert minimap coords to canvas coords, center viewport there
  const canvasX = (mx / mmW) * CANVAS_W;
  const canvasY = (my / mmH) * CANVAS_H;
  panX = -(canvasX - vw / 2);
  panY = -(canvasY - vh / 2);
  canvas.style.transform = `translate(${panX}px, ${panY}px)`;
  updateMinimap();
}

mmEl.addEventListener('mousedown', (e) => {
  e.preventDefault();
  e.stopPropagation();
  mmDragging = true;
  mmNavigate(e.clientX, e.clientY);
});

document.addEventListener('mousemove', (e) => {
  if (!mmDragging) return;
  mmNavigate(e.clientX, e.clientY);
});

document.addEventListener('mouseup', () => {
  mmDragging = false;
});

// Touch support for minimap
mmEl.addEventListener('touchstart', (e) => {
  e.stopPropagation();
  mmDragging = true;
  mmNavigate(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

mmEl.addEventListener('touchmove', (e) => {
  if (!mmDragging) return;
  e.stopPropagation();
  mmNavigate(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

mmEl.addEventListener('touchend', () => {
  mmDragging = false;
});

// --- Filters: season + location ---
const seasonMap = {
  spring: ['2024-03','2024-04','2024-05'],
  summer: ['2024-07','2024-08','2024-09'],
  autumn: ['2024-10','2024-11'],
  winter: ['2024-02','2024-12','2025-01','2025-02']
};

// Extract unique locations from meta (first word before comma)
const locations = [...new Set(photos.map(p => {
  const m = p.meta.match(/^([^,·]+)/);
  return m ? m[1].trim() : 'Other';
}))].sort();

// Build location buttons
const locGroup = document.getElementById('location-filters');
locations.forEach(loc => {
  const btn = document.createElement('button');
  btn.className = 'fbtn';
  btn.dataset.location = loc;
  btn.textContent = loc;
  locGroup.appendChild(btn);
});

// Store original positions
const photoEls = document.querySelectorAll('.photo');
const originals = new Map();
photoEls.forEach(el => {
  originals.set(el, {
    left: el.style.left,
    top: el.style.top,
    transform: el.style.transform,
    zIndex: el.style.zIndex
  });
});

let activeFilter = null; // { type: 'season'|'location', value: string }

function getPhotoForEl(el) {
  const idx = parseInt(el.dataset.idx);
  return shuffled[idx];
}

function matchesFilter(photo) {
  if (!activeFilter) return true;
  if (activeFilter.type === 'season') {
    return seasonMap[activeFilter.value].includes(photo.date);
  }
  if (activeFilter.type === 'location') {
    const m = photo.meta.match(/^([^,·]+)/);
    const loc = m ? m[1].trim() : 'Other';
    return loc === activeFilter.value;
  }
  return true;
}

function applyFilter() {
  const pileCount = document.getElementById('pile-count');

  if (!activeFilter) {
    // Reset all to original positions
    photoEls.forEach(el => {
      el.classList.add('piled');
      el.classList.remove('dimmed');
      const orig = originals.get(el);
      el.style.left = orig.left;
      el.style.top = orig.top;
      el.style.transform = orig.transform;
      el.style.zIndex = orig.zIndex;
    });
    pileCount.classList.remove('show');
    // Remove piled class after transition
    setTimeout(() => photoEls.forEach(el => el.classList.remove('piled')), 700);
    return;
  }

  // Calculate pile center (viewport center in canvas coords)
  const cx = (-panX + vw / 2);
  const cy = (-panY + vh / 2);

  let matchCount = 0;
  let pileIdx = 0;

  // First pass: count matches
  photoEls.forEach(el => {
    if (matchesFilter(getPhotoForEl(el))) matchCount++;
  });

  // Arrange in a loose grid centered on viewport
  const pileCols = Math.min(Math.ceil(Math.sqrt(matchCount * 1.3)), 6);
  const pileSpacing = isMobile ? 140 : 200;
  const pileW = pileCols * pileSpacing;
  const pileRows = Math.ceil(matchCount / pileCols);
  const pileH = pileRows * pileSpacing;
  const startX = cx - pileW / 2;
  const startY = cy - pileH / 2;

  pileIdx = 0;
  photoEls.forEach(el => {
    el.classList.add('piled');
    const photo = getPhotoForEl(el);
    const matches = matchesFilter(photo);

    if (matches) {
      el.classList.remove('dimmed');
      const col = pileIdx % pileCols;
      const row = Math.floor(pileIdx / pileCols);
      const stackX = startX + col * pileSpacing + (rand() - 0.5) * 30;
      const stackY = startY + row * pileSpacing + (rand() - 0.5) * 30;
      const stackRot = (rand() - 0.5) * 10;
      el.style.left = stackX + 'px';
      el.style.top = stackY + 'px';
      el.style.transform = `rotate(${stackRot}deg)`;
      el.style.zIndex = 5000 + pileIdx;
      pileIdx++;
    } else {
      el.classList.add('dimmed');
    }
  });

  pileCount.textContent = `${matchCount} photos`;
  pileCount.classList.add('show');
}

// Click handlers
document.getElementById('filters').addEventListener('click', (e) => {
  const btn = e.target.closest('.fbtn');
  if (!btn) return;

  const wasSame = btn.classList.contains('active');

  // Clear all active
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));

  if (wasSame) {
    activeFilter = null;
  } else {
    btn.classList.add('active');
    if (btn.dataset.season) {
      activeFilter = { type: 'season', value: btn.dataset.season };
    } else if (btn.dataset.location) {
      activeFilter = { type: 'location', value: btn.dataset.location };
    }
  }

  applyFilter();
});
</script>

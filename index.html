<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wayne — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'Space Mono', monospace;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: var(--mono);
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-style: italic;
    }

    .header-links {
      display: flex; gap: 2rem;
    }

    .header-links a {
      color: #fff;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .header-links a:hover { opacity: 1; }

    /* ─── Coverflow Container ─── */
    .coverflow-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* The dark gradient "stage" */
      background:
        radial-gradient(ellipse 120% 60% at 50% 55%, rgba(20,20,25,1) 0%, #0a0a0a 100%);
    }

    .coverflow {
      position: relative;
      width: 100%;
      height: 480px;
      perspective: 1200px;
      perspective-origin: 50% 40%;
    }

    /* ─── Individual Cover ─── */
    .cover {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 320px;
      height: 420px;
      margin-left: -160px;
      margin-top: -230px;
      transform-style: preserve-3d;
      transition: all 0.55s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: pointer;
      will-change: transform, opacity, z-index;
    }

    .cover-img-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      transition: box-shadow 0.5s;
      background: #111;
    }

    .cover.active .cover-img-wrap {
      box-shadow: 0 15px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05);
    }

    .cover-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── Reflection ─── */
    .cover-reflection {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 4px;
      overflow: hidden;
      transform: scaleY(-1);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 35%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 35%);
      pointer-events: none;
    }

    .cover-reflection img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(1px) brightness(0.6);
    }

    /* ─── Floor gradient ─── */
    .floor {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 35%;
      background: linear-gradient(to top, #0a0a0a 0%, transparent 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* ─── Photo Info ─── */
    .info {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      text-align: center;
      padding: 0 2rem 3rem;
      pointer-events: none;
    }

    .info-title {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-style: italic;
      font-weight: 400;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .info-title.show {
      opacity: 1;
      transform: translateY(0);
    }

    .info-meta {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      margin-top: 0.6rem;
      opacity: 0;
      transition: opacity 0.5s 0.1s;
    }
    .info-meta.show { opacity: 1; }

    .info-desc {
      font-family: var(--serif);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      margin-top: 0.6rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.5s 0.15s;
    }
    .info-desc.show { opacity: 1; }

    /* ─── Counter ─── */
    .counter {
      position: fixed;
      top: 50%;
      right: 2.5rem;
      transform: translateY(-50%);
      z-index: 10;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.2);
      writing-mode: vertical-rl;
    }

    /* ─── Scrollbar / Track ─── */
    .track-wrap {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(500px, 80vw);
      z-index: 10;
      pointer-events: auto;
    }

    .track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      position: relative;
      cursor: pointer;
    }

    .track-thumb {
      position: absolute;
      top: -4px;
      height: 10px;
      width: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transition: left 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.2s;
      cursor: grab;
    }
    .track-thumb:hover { transform: scale(1.5); }
    .track-thumb:active { cursor: grabbing; }

    .track-fill {
      height: 100%;
      background: rgba(255,255,255,0.25);
      border-radius: 1px;
      transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      header { padding: 1rem 1.5rem; }
      .header-links { display: none; }
      .cover { width: 220px; height: 290px; margin-left: -110px; margin-top: -160px; }
      .coverflow { height: 360px; }
      .info { padding: 0 1.5rem 2.5rem; }
      .info-desc { display: none; }
      .counter { display: none; }
    }

    @media (max-width: 480px) {
      .cover { width: 180px; height: 240px; margin-left: -90px; margin-top: -135px; }
    }

    /* ─── Fade in ─── */
    .coverflow-wrap, header, .info, .counter, .track-wrap {
      opacity: 0;
      animation: pageIn 1s 0.2s forwards;
    }
    @keyframes pageIn { to { opacity: 1; } }
  </style>
</head>
<body>

<header>
  <div class="logo">W.</div>
  <div class="header-links">
    <a href="mailto:wayne@example.com">Contact</a>
    <a href="https://github.com/waynedddd" target="_blank">GitHub</a>
  </div>
</header>

<div class="coverflow-wrap">
  <div class="coverflow" id="coverflow"></div>
</div>

<div class="floor"></div>

<div class="info">
  <div class="info-title" id="infoTitle">Silent Peak</div>
  <div class="info-meta" id="infoMeta">Yunnan, 2025 · Fujifilm X-T5</div>
  <div class="info-desc" id="infoDesc">Morning mist clings to the mountain ridges like memory.</div>
</div>

<div class="counter" id="counter">01 — 12</div>

<div class="track-wrap">
  <div class="track" id="track">
    <div class="track-fill" id="trackFill"></div>
    <div class="track-thumb" id="trackThumb"></div>
  </div>
</div>

<script>
const photos = [
  { url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=800&fit=crop', title: 'Silent Peak', meta: 'Yunnan, 2025 · Fujifilm X-T5', desc: 'Morning mist clings to the mountain ridges like memory.' },
  { url: 'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=600&h=800&fit=crop', title: 'First Light', meta: 'Guizhou, 2025 · Nikon FM2', desc: 'The valley catches the first sunlight before the village wakes.' },
  { url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&h=800&fit=crop', title: 'Altitude', meta: 'Tibet, 2024 · Fujifilm X-T5', desc: 'At 5,200 meters, the sky deepens into something almost black.' },
  { url: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&h=800&fit=crop', title: 'Canopy', meta: 'Sichuan, 2024 · Ricoh GR IIIx', desc: 'Light falls through the canopy in columns, like a cathedral.' },
  { url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&h=800&fit=crop', title: 'Shore Lines', meta: 'Hainan, 2024 · Fujifilm X-T5', desc: 'The tide writes and rewrites the same story every six hours.' },
  { url: 'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=600&h=800&fit=crop', title: 'After Dark', meta: 'Qinghai, 2024 · 25s exposure', desc: 'Drive three hours from any city to see this many stars.' },
  { url: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600&h=800&fit=crop', title: 'Still Waters', meta: 'Jiuzhaigou, 2024 · Nikon FM2', desc: 'The lake holds the mountain so perfectly you forget which way is up.' },
  { url: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=600&h=800&fit=crop', title: 'Golden Hour', meta: 'Inner Mongolia, 2024 · Fujifilm X-T5', desc: 'The grassland turns gold for exactly twenty minutes.' },
  { url: 'https://images.unsplash.com/photo-1518098268026-4e89f1a2cd8e?w=600&h=800&fit=crop', title: 'Tidal Memory', meta: 'Fujian, 2024 · Ricoh GR IIIx', desc: "Fishermen's poles stand like notation in an ocean-sized score." },
  { url: 'https://images.unsplash.com/photo-1500534623283-312aade485b7?w=600&h=800&fit=crop', title: 'Fog', meta: 'Anhui, 2024 · Fujifilm X-T5', desc: 'Huangshan in fog is less a mountain and more a suggestion.' },
  { url: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600&h=800&fit=crop', title: 'Between', meta: 'Zhejiang, 2024 · Nikon FM2', desc: 'Sun breaks through. Everything is backlit and borderless.' },
  { url: 'https://images.unsplash.com/photo-1446292532430-3e76f6ab6444?w=600&h=800&fit=crop', title: 'Solitude', meta: 'Xinjiang, 2023 · Fujifilm X-T5', desc: 'A single road cutting through nothing. The most honest landscape.' }
];

const container = document.getElementById('coverflow');
const total = photos.length;
let current = 0;

// ─── Build covers ───
photos.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'cover';
  el.dataset.index = i;
  el.innerHTML = `
    <div class="cover-img-wrap">
      <img src="${p.url}" alt="${p.title}" loading="lazy" draggable="false">
    </div>
    <div class="cover-reflection">
      <img src="${p.url}" alt="" loading="lazy" draggable="false">
    </div>
  `;
  el.addEventListener('click', () => goTo(i));
  container.appendChild(el);
});

const covers = document.querySelectorAll('.cover');

// ─── Core Coverflow layout ───
// Center cover: face-on, z-index high
// Left covers: rotateY(+55deg), shifted left, stacked
// Right covers: rotateY(-55deg), shifted right, stacked
const TILT = 55;          // degrees
const SPACING = 72;       // px between stacked covers
const CENTER_GAP = 210;   // px gap from center to first tilted
const Z_STEP = 30;        // z offset per step from center

function layout() {
  covers.forEach((cover, i) => {
    const offset = i - current;
    let tx, ry, tz, op, zi;

    if (offset === 0) {
      // Center
      tx = 0;
      ry = 0;
      tz = 0;
      op = 1;
      zi = total;
    } else if (offset < 0) {
      // Left side
      tx = -CENTER_GAP + offset * SPACING;
      ry = TILT;
      tz = -Math.abs(offset) * Z_STEP;
      op = Math.max(0, 1 - Math.abs(offset) * 0.12);
      zi = total + offset;
    } else {
      // Right side
      tx = CENTER_GAP + (offset - 1) * SPACING;
      ry = -TILT;
      tz = -offset * Z_STEP;
      op = Math.max(0, 1 - offset * 0.12);
      zi = total - offset;
    }

    cover.style.transform = `translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg)`;
    cover.style.opacity = op;
    cover.style.zIndex = zi;
    cover.classList.toggle('active', offset === 0);
  });

  // Update info
  const p = photos[current];
  const title = document.getElementById('infoTitle');
  const meta = document.getElementById('infoMeta');
  const desc = document.getElementById('infoDesc');

  title.classList.remove('show');
  meta.classList.remove('show');
  desc.classList.remove('show');

  setTimeout(() => {
    title.textContent = p.title;
    meta.textContent = p.meta;
    desc.textContent = p.desc;
    title.classList.add('show');
    meta.classList.add('show');
    desc.classList.add('show');
  }, 150);

  // Counter
  document.getElementById('counter').textContent =
    `${String(current + 1).padStart(2, '0')} — ${String(total).padStart(2, '0')}`;

  // Track
  const pct = current / (total - 1);
  document.getElementById('trackFill').style.width = `${pct * 100}%`;
  document.getElementById('trackThumb').style.left = `calc(${pct * 100}% - 5px)`;
}

function goTo(i) {
  current = Math.max(0, Math.min(total - 1, i));
  layout();
}

// ─── Controls ───

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
});

// Wheel
let wheelCd = false;
document.addEventListener('wheel', e => {
  if (wheelCd) return;
  wheelCd = true;
  setTimeout(() => wheelCd = false, 350);
  e.deltaY > 0 || e.deltaX > 0 ? goTo(current + 1) : goTo(current - 1);
}, { passive: true });

// Touch swipe
let tx0 = 0;
document.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  if (Math.abs(dx) > 40) dx > 0 ? goTo(current - 1) : goTo(current + 1);
}, { passive: true });

// Track click
document.getElementById('track').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  goTo(Math.round(pct * (total - 1)));
});

// Track drag
let dragging = false;
const thumb = document.getElementById('trackThumb');
thumb.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = document.getElementById('track').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  goTo(Math.round(pct * (total - 1)));
});
document.addEventListener('mouseup', () => { dragging = false; });

// ─── Init ───
layout();
</script>

</body>
</html>

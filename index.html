<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wayne — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'Space Mono', monospace;
      --bg: #111;
      --film: #0a0a0a;
      --border: #222;
      --text: #999;
      --text-dim: #444;
      --accent: #f5f0e8;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    header h1 {
      font-family: var(--serif);
      font-size: 24px;
      font-style: italic;
      color: var(--accent);
      font-weight: normal;
    }

    header .count {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Filter bar */
    .filters {
      position: sticky;
      top: 65px;
      z-index: 99;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 10px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 12px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
      border-radius: 0;
    }

    .filter-btn:hover {
      color: var(--text);
      border-color: var(--text);
    }

    .filter-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 2px;
      padding: 2px;
      background: var(--film);
    }

    /* Cell */
    .cell {
      position: relative;
      background: var(--film);
      cursor: pointer;
      overflow: hidden;
    }

    .cell .frame {
      position: relative;
      width: 100%;
      padding-top: 66.67%; /* 3:2 default */
      overflow: hidden;
    }

    .cell.portrait .frame {
      padding-top: 150%; /* 2:3 */
    }

    .cell img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(30%) contrast(1.05);
      transition: filter 0.4s ease, transform 0.4s ease;
    }

    .cell:hover img {
      filter: grayscale(0%) contrast(1);
      transform: scale(1.03);
    }

    /* Film edge marks */
    .cell .edge {
      position: absolute;
      top: 6px;
      left: 8px;
      right: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      color: rgba(255,140,0,0.5);
      font-family: var(--mono);
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 2;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* Bottom info */
    .cell .info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px 10px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .cell:hover .info {
      opacity: 1;
    }

    .cell .info .title {
      font-family: var(--serif);
      font-size: 15px;
      font-style: italic;
      color: #fff;
      margin-bottom: 2px;
    }

    .cell .info .meta {
      font-size: 9px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Section headers in grid */
    .section-header {
      grid-column: 1 / -1;
      padding: 48px 32px 16px;
      background: var(--bg);
    }

    .section-header h2 {
      font-family: var(--serif);
      font-size: 32px;
      font-style: italic;
      color: var(--accent);
      font-weight: normal;
      margin-bottom: 4px;
    }

    .section-header .sub {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.95);
      cursor: zoom-out;
    }

    #lightbox.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 75vh;
      object-fit: contain;
    }

    #lightbox .lb-info {
      margin-top: 20px;
      text-align: center;
    }

    #lightbox .lb-info .title {
      font-family: var(--serif);
      font-size: 26px;
      font-style: italic;
      color: var(--accent);
      margin-bottom: 6px;
    }

    #lightbox .lb-info .desc {
      font-family: var(--serif);
      font-size: 14px;
      color: #777;
      max-width: 500px;
      line-height: 1.6;
      margin: 0 auto 8px;
    }

    #lightbox .lb-info .meta {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    #lightbox .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.2s;
    }

    #lightbox .nav:hover { opacity: 0.7; }
    #lightbox .nav svg { width: 24px; height: 24px; fill: none; stroke: #fff; stroke-width: 1.5; }
    #lightbox .nav.prev { left: 16px; }
    #lightbox .nav.next { right: 16px; }

    /* Footer */
    footer {
      padding: 48px 32px;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    footer .sig {
      font-family: var(--serif);
      font-size: 18px;
      font-style: italic;
      color: var(--text-dim);
    }

    /* Mobile */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
      header { padding: 16px 16px; }
      .filters { padding: 10px 16px; top: 57px; }
      .section-header { padding: 32px 16px 12px; }
      .section-header h2 { font-size: 24px; }
      .cell .edge { font-size: 7px; }
      .cell .info { opacity: 1; padding: 24px 6px 6px; }
      .cell .info .title { font-size: 12px; }
      .cell .info .meta { font-size: 8px; }
      #lightbox .nav { display: none; }
    }

    @media (min-width: 1400px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }
    }
  </style>
</head>

sections.forEach(sec => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = sec.title;
  btn.dataset.filter = sec.id;
  filtersEl.appendChild(btn);
});

filtersEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

function render() {
  grid.innerHTML = '';
  flatList = [];
  let frameNum = 1;

  sections.forEach(sec => {
    const secPhotos = photos.filter(sec.filter);
    if (secPhotos.length === 0) return;
    if (activeFilter !== 'all' && activeFilter !== sec.id) return;

    // Section header
    if (activeFilter === 'all') {
      const header = document.createElement('div');
      header.className = 'section-header';
      header.innerHTML = `<h2>${sec.title}</h2><div class="sub">${sec.sub}</div>`;
      grid.appendChild(header);
    }

    secPhotos.forEach((p, idx) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (p.orient === 'v' ? ' portrait' : '');
      const fn = String(frameNum).padStart(2, '0');
      cell.innerHTML = `
        <div class="frame">
          <img src="${p.url}" alt="${p.title}" loading="lazy">
          <div class="edge">
            <span>${fn}</span>
            <span>▶ ${fn}A</span>
          </div>
          <div class="info">
            <div class="title">${p.title}</div>
            <div class="meta">${p.meta}</div>
          </div>
        </div>
      `;
      const flatIdx = flatList.length;
      cell.addEventListener('click', () => openLB(flatIdx));
      grid.appendChild(cell);
      flatList.push(p);
      frameNum++;
    });
  });

  document.getElementById('photo-count').textContent = `${flatList.length} frames`;
}

render();

// --- Lightbox ---
let lbIdx = -1;

function openLB(idx) {
  lbIdx = idx;
  const p = flatList[idx];
  document.getElementById('lb-img').src = p.url;
  document.getElementById('lb-title').textContent = p.title;
  document.getElementById('lb-desc').textContent = p.desc;
  document.getElementById('lb-meta').textContent = p.meta;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
  lbIdx = -1;
}

function lbGo(dir) {
  const next = lbIdx + dir;
  if (next < 0 || next >= flatList.length) return;
  openLB(next);
}

function handleLBClick(e) {
  if (e.target.closest('.nav')) return;
  closeLB();
}

document.addEventListener('keydown', (e) => {
  if (lbIdx < 0) return;
  if (e.key === 'Escape') closeLB();
  if (e.key === 'ArrowRight') lbGo(1);
  if (e.key === 'ArrowLeft') lbGo(-1);
});
</script>

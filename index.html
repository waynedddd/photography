<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wayne — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'Space Mono', monospace;
      --bg: #f5f0e8;
      --ink: #1a1a1a;
      --grey: #888;
      --light: #ccc;
    }

    html {
      height: 100%;
    }

    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      -webkit-user-select: none;
      user-select: none;
      -webkit-text-size-adjust: 100%;
    }

    #zine {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .page {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateX(60px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .page.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .page.prev {
      opacity: 0;
      transform: translateX(-60px);
    }

    /* Layout: Full Bleed */
    .layout-bleed {
      padding: 0;
    }
    .layout-bleed img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .layout-bleed .overlay {
      position: absolute;
      bottom: 40px;
      left: 40px;
      right: 40px;
    }
    .layout-bleed .overlay .title {
      font-family: var(--serif);
      font-size: clamp(28px, 5vw, 56px);
      font-style: italic;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      margin-bottom: 4px;
    }
    .layout-bleed .overlay .meta {
      font-family: var(--mono);
      font-size: clamp(9px, 1.2vw, 12px);
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Layout: White Space (big margins, text) */
    .layout-white {
      flex-direction: column;
      padding: 8vh 10vw;
      gap: 24px;
    }
    .layout-white img {
      max-width: 65vw;
      max-height: 55vh;
      object-fit: contain;
    }
    .layout-white .text {
      max-width: 500px;
      text-align: center;
    }
    .layout-white .text .title {
      font-family: var(--serif);
      font-size: clamp(24px, 3.5vw, 42px);
      font-style: italic;
      margin-bottom: 8px;
    }
    .layout-white .text .desc {
      font-family: var(--serif);
      font-size: clamp(13px, 1.8vw, 17px);
      color: #555;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .layout-white .text .meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--grey);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Layout: Side by Side (two photos) */
    .layout-duo {
      padding: 6vh 5vw;
      gap: 3vw;
    }
    .layout-duo .duo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .layout-duo img {
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
    }
    .layout-duo .caption {
      text-align: center;
    }
    .layout-duo .caption .title {
      font-family: var(--serif);
      font-size: 18px;
      font-style: italic;
    }
    .layout-duo .caption .meta {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--grey);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Layout: Vertical Center (portrait photo, text to side) */
    .layout-portrait {
      padding: 5vh 8vw;
      gap: 5vw;
    }
    .layout-portrait img {
      max-height: 80vh;
      max-width: 40vw;
      object-fit: contain;
    }
    .layout-portrait .side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 320px;
    }
    .layout-portrait .side .title {
      font-family: var(--serif);
      font-size: clamp(26px, 3vw, 40px);
      font-style: italic;
      margin-bottom: 12px;
    }
    .layout-portrait .side .desc {
      font-family: var(--serif);
      font-size: 15px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .layout-portrait .side .meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--grey);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Layout: Text Only (section divider) */
    .layout-text {
      flex-direction: column;
      gap: 12px;
    }
    .layout-text .big {
      font-family: var(--serif);
      font-size: clamp(36px, 7vw, 80px);
      font-style: italic;
      color: var(--ink);
    }
    .layout-text .sub {
      font-family: var(--mono);
      font-size: clamp(10px, 1.5vw, 13px);
      color: var(--grey);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Cover */
    .layout-cover {
      flex-direction: column;
      gap: 16px;
      background: var(--ink);
    }
    .layout-cover .cover-title {
      font-family: var(--serif);
      font-size: clamp(40px, 8vw, 90px);
      font-style: italic;
      color: var(--bg);
      letter-spacing: -1px;
    }
    .layout-cover .cover-sub {
      font-family: var(--mono);
      font-size: clamp(9px, 1.2vw, 12px);
      color: var(--grey);
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .layout-cover .cover-hint {
      position: absolute;
      bottom: 40px;
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }

    /* Page counter */
    #counter {
      position: fixed;
      bottom: 20px;
      right: 24px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--grey);
      letter-spacing: 1px;
      z-index: 100;
      mix-blend-mode: difference;
    }

    /* Progress bar */
    #progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--ink);
      transition: width 0.4s ease;
      z-index: 100;
    }

    /* Nav arrows */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      opacity: 0.15;
      transition: opacity 0.3s;
      mix-blend-mode: difference;
    }
    .nav-arrow:hover { opacity: 0.5; }
    .nav-arrow svg { width: 20px; height: 20px; fill: none; stroke: var(--ink); stroke-width: 2; }
    #nav-prev { left: 12px; }
    #nav-next { right: 12px; }

    /* Mobile */
    @media (max-width: 768px) {
      .layout-white { padding: 6vh 6vw; }
      .layout-white img { max-width: 85vw; max-height: 50vh; }
      .layout-portrait {
        flex-direction: column;
        padding: 4vh 6vw;
        gap: 20px;
      }
      .layout-portrait img { max-width: 80vw; max-height: 55vh; }
      .layout-portrait .side { max-width: 90vw; text-align: center; }
      .layout-duo {
        flex-direction: column;
        padding: 4vh 6vw;
        gap: 20px;
      }
      .layout-duo img { max-height: 35vh; }
      .layout-bleed .overlay {
        bottom: 20px;
        left: 20px;
        right: 20px;
      }
      .nav-arrow { display: none; }
    }
  </style>
</head>

  { title: 'Journeys', sub: 'Elsewhere · 2024', photos: photos.filter(p => ['2024-02','2024-03','2024-10'].includes(p.date)) },
];

// --- Build page data (no DOM yet) ---
const pageData = []; // array of { html, layoutClass }

function addPageData(html, layoutClass) {
  pageData.push({ html, layoutClass });
}

addPageData(`
  <div class="cover-title">Wayne</div>
  <div class="cover-sub">Photography · 2024 — 2025</div>
  <div class="cover-hint">→ swipe or press arrow keys</div>
`, 'layout-cover');

const layoutPatterns = ['bleed', 'white', 'bleed', 'portrait', 'duo', 'white', 'bleed'];
let patIdx = 0;

sections.forEach(sec => {
  if (sec.photos.length === 0) return;

  addPageData(`
    <div class="big">${sec.title}</div>
    <div class="sub">${sec.sub}</div>
  `, 'layout-text');

  let i = 0;
  while (i < sec.photos.length) {
    const p = sec.photos[i];
    const p2 = sec.photos[i + 1];

    if (p.orient === 'v') {
      addPageData(`
        <img src="${p.url}" alt="${p.title}">
        <div class="side">
          <div class="title">${p.title}</div>
          <div class="desc">${p.desc}</div>
          <div class="meta">${p.meta}</div>
        </div>
      `, 'layout-portrait');
      i++;
      continue;
    }

    if (p2 && p2.orient === 'h' && patIdx % 3 === 0) {
      addPageData(`
        <div class="duo-item">
          <img src="${p.url}" alt="${p.title}">
          <div class="caption"><div class="title">${p.title}</div><div class="meta">${p.meta}</div></div>
        </div>
        <div class="duo-item">
          <img src="${p2.url}" alt="${p2.title}">
          <div class="caption"><div class="title">${p2.title}</div><div class="meta">${p2.meta}</div></div>
        </div>
      `, 'layout-duo');
      patIdx++;
      i += 2;
      continue;
    }

    const layout = layoutPatterns[patIdx % layoutPatterns.length];
    patIdx++;

    if (layout === 'bleed') {
      addPageData(`
        <img src="${p.url}" alt="${p.title}">
        <div class="overlay"><div class="title">${p.title}</div><div class="meta">${p.meta}</div></div>
      `, 'layout-bleed');
    } else {
      addPageData(`
        <img src="${p.url}" alt="${p.title}">
        <div class="text"><div class="title">${p.title}</div><div class="desc">${p.desc}</div><div class="meta">${p.meta}</div></div>
      `, 'layout-white');
    }
    i++;
  }
});

addPageData(`
  <div class="cover-title">Fin.</div>
  <div class="cover-sub">${photos.length} photographs · Wayne</div>
`, 'layout-cover');

// --- Virtual rendering: only 3 DOM nodes ---
const zine = document.getElementById('zine');
const slots = [0, 1, 2].map(() => {
  const div = document.createElement('div');
  div.className = 'page';
  zine.appendChild(div);
  return div;
});

let current = 0;
const total = pageData.length;

function renderSlot(slot, idx) {
  if (idx < 0 || idx >= total) {
    slot.className = 'page';
    slot.innerHTML = '';
    slot.style.visibility = 'hidden';
    return;
  }
  const d = pageData[idx];
  slot.className = 'page ' + d.layoutClass;
  slot.innerHTML = d.html;
  slot.style.visibility = 'visible';
}

function showPage(idx, dir) {
  current = idx;
  // slot 0 = prev, 1 = current, 2 = next
  renderSlot(slots[0], idx - 1);
  renderSlot(slots[1], idx);
  renderSlot(slots[2], idx + 1);

  slots[0].classList.add('prev');
  slots[1].classList.add('active');
  slots[2].classList.remove('active', 'prev');

  document.getElementById('counter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('progress').style.width = ((idx + 1) / total * 100) + '%';
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= total) return;
  showPage(next, dir);
}

showPage(0, 1);

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
});

// Touch swipe
let touchStartX = 0;
let touchStartY = 0;
let touchMoved = false;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchMoved = false;
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  touchMoved = true;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    go(dx < 0 ? 1 : -1);
  }
});

// Mouse wheel (desktop only)
if (!('ontouchstart' in window)) {
  let wheelTimer = null;
  document.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (wheelTimer) return;
    wheelTimer = setTimeout(() => { wheelTimer = null; }, 400);
    go(e.deltaY > 0 ? 1 : -1);
  }, { passive: false });
}
</script>
</body>
</html>

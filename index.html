<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wayne — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'Space Mono', monospace;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: var(--mono);
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-style: italic;
    }

    .header-links {
      display: flex; gap: 2rem;
    }

    .header-links a {
      color: #fff;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .header-links a:hover { opacity: 1; }

    /* ─── Coverflow Container ─── */
    .coverflow-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* The dark gradient "stage" */
      background:
        radial-gradient(ellipse 120% 60% at 50% 55%, rgba(20,20,25,1) 0%, #0a0a0a 100%);
    }

    .coverflow {
      position: relative;
      width: 100%;
      height: 480px;
      perspective: 1200px;
      perspective-origin: 50% 40%;
    }

    /* ─── Individual Cover ─── */
    .cover {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s, opacity 0.4s;
      cursor: pointer;
      will-change: transform, opacity, filter;
    }

    .cover.orient-v {
      width: 42vh; height: 60vh;
      margin-left: -21vh; margin-top: -33vh;
    }
    .cover.orient-h {
      width: 80vh; height: auto;
      aspect-ratio: 3/2;
      margin-left: -40vh; margin-top: -27vh;
    }

    .cover-img-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      transition: box-shadow 0.5s;
      background: #111;
      backface-visibility: hidden;
    }

    .cover.active .cover-img-wrap {
      box-shadow: 0 15px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05);
    }

    .cover-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.5s;
    }

    /* Glass mode for side cards */
    .cover-img-wrap.glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .cover-img-wrap.glass img {
      opacity: 0;
    }

    /* ─── Reflection ─── */
    .cover-reflection {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 4px;
      overflow: hidden;
      transform: scaleY(-1);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 35%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 35%);
      pointer-events: none;
    }

    .cover-reflection img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(1px) brightness(0.6);
    }

    /* ─── Floor gradient ─── */
    .floor {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 35%;
      background: linear-gradient(to top, #0a0a0a 0%, transparent 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* ─── Photo Info ─── */
    .info {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      text-align: center;
      padding: 0 2rem 5rem;
      pointer-events: none;
    }

    .info-title {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-style: italic;
      font-weight: 400;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .info-title.show {
      opacity: 1;
      transform: translateY(0);
    }

    .info-meta {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      margin-top: 0.6rem;
      opacity: 0;
      transition: opacity 0.5s 0.1s;
    }
    .info-meta.show { opacity: 1; }

    .info-desc {
      font-family: var(--serif);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      margin-top: 0.6rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.5s 0.15s;
    }
    .info-desc.show { opacity: 1; }

    /* ─── Counter ─── */
    .counter {
      position: fixed;
      top: 50%;
      right: 2.5rem;
      transform: translateY(-50%);
      z-index: 10;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.2);
      writing-mode: vertical-rl;
    }

    /* ─── Scrollbar / Track ─── */
    .track-wrap {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(500px, 80vw);
      z-index: 10;
      pointer-events: auto;
    }

    .track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      position: relative;
      cursor: pointer;
    }

    .track-ticks {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      pointer-events: none;
    }

    .track-tick {
      position: absolute;
      top: -3px;
      width: 1px;
      height: 8px;
      background: rgba(255,255,255,0.15);
    }

    .track-tick-label {
      position: absolute;
      top: 12px;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 0.5rem;
      color: rgba(255,255,255,0.2);
      white-space: nowrap;
    }

    .track-thumb {
      position: absolute;
      top: -4px;
      height: 10px;
      width: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transition: left 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.2s;
      cursor: grab;
    }
    .track-thumb:hover { transform: scale(1.5); }
    .track-thumb:active { cursor: grabbing; }

    .track-fill {
      height: 100%;
      background: rgba(255,255,255,0.25);
      border-radius: 1px;
      transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      header { padding: 1rem 1.5rem; }
      .header-links { display: none; }
      .cover.orient-v { width: 55vw; height: 65vh; margin-left: -27.5vw; margin-top: -35vh; }
      .cover.orient-h { width: 85vw; height: auto; aspect-ratio: 3/2; margin-left: -42.5vw; margin-top: calc(-85vw / 3); }
      .coverflow { height: 400px; }
      .info { padding: 0 1.5rem 2.5rem; }
      .info-desc { display: none; }
      .counter { display: none; }
      .track-tick-label { font-size: 0.45rem; }
    }

    @media (max-width: 480px) {
      .cover.orient-v { width: 65vw; height: 60vh; margin-left: -32.5vw; margin-top: -33vh; }
      .cover.orient-h { width: 90vw; height: auto; aspect-ratio: 3/2; margin-left: -45vw; margin-top: calc(-90vw / 3); }
      .info-title { font-size: 1.5rem; }
    }

    /* ─── Fade in ─── */
    .coverflow-wrap, header, .info, .counter, .track-wrap {
      opacity: 0;
      animation: pageIn 1s 0.2s forwards;
    }
    @keyframes pageIn { to { opacity: 1; } }
  </style>
</head>
<body>

<header>
  <div class="logo">W.</div>
  <div class="header-links">
    <a href="mailto:wayne@example.com">Contact</a>
    <a href="https://github.com/waynedddd" target="_blank">GitHub</a>
  </div>
</header>

<div class="coverflow-wrap">
  <div class="coverflow" id="coverflow"></div>
</div>

<div class="floor"></div>

<div class="info">
  <div class="info-title" id="infoTitle">Silent Peak</div>
  <div class="info-meta" id="infoMeta">Yunnan, 2025 · Fujifilm X-T5</div>
  <div class="info-desc" id="infoDesc">Morning mist clings to the mountain ridges like memory.</div>
</div>

<div class="counter" id="counter">01 — 12</div>

<div class="track-wrap">
  <div class="track" id="track">
    <div class="track-fill" id="trackFill"></div>
    <div class="track-thumb" id="trackThumb"></div>
    <div class="track-ticks"></div>
  </div>
</div>

<script>
const photos = [
  // 2025-02 Haikou
  { url: 'photos/web/DSC01484_SnapseedCopy.jpg', title: 'Shadow Play', meta: 'Haikou, 2025 · Sony', desc: 'A small dog stepping through patches of afternoon light.', orient: 'h', date: '2025-02' },
  { url: 'photos/web/DSC01464_SnapseedCopy.jpg', title: 'Shoreline', meta: 'Haikou, 2025 · Sony', desc: 'A man rides a horse on the beach, checking his phone.', orient: 'h', date: '2025-02' },
  { url: 'photos/web/DSC01433_SnapseedCopy.jpg', title: 'Market Day', meta: 'Haikou, 2025 · Sony', desc: 'Straw hats, fresh greens, and the hum of a morning market.', orient: 'h', date: '2025-02' },
  { url: 'photos/web/DSC01418_SnapseedCopy.jpg', title: 'Spring Couplets', meta: 'Haikou, 2025 · Sony', desc: 'Red banners catch the sea wind. A woman walks past without looking.', orient: 'h', date: '2025-02' },
  { url: 'photos/web/DSC01411_SnapseedCopy.jpg', title: 'Bone Setting', meta: 'Haikou, 2025 · Sony', desc: 'Traditional massage by the sea. Business is slow today.', orient: 'h', date: '2025-02' },
  { url: 'photos/web/DSC01393_SnapseedCopy.jpg', title: 'Waterfront', meta: 'Haikou, 2025 · Sony', desc: 'Fishermen lunch by the theme park. Nobody rides the coasters.', orient: 'h', date: '2025-02' },
  { url: 'photos/web/DSC01385_SnapseedCopy.jpg', title: 'Unplayed', meta: 'Haikou, 2025 · Sony', desc: 'A white piano on dead grass. The church watches in silence.', orient: 'h', date: '2025-02' },
  { url: 'photos/web/DSC01301_SnapseedCopy.jpg', title: 'Blue Wall', meta: 'Haikou, 2025 · Sony', desc: 'A painted seagull on a sky-blue wall. Almost real.', orient: 'v', date: '2025-02' },
  { url: 'photos/web/DSC01233_SnapseedCopy.jpg', title: 'Light Boxes', meta: 'Haikou, 2025 · Sony', desc: 'Two silhouettes pass the glowing billboards at night.', orient: 'h', date: '2025-02' },
  { url: 'photos/web/IMG_1514.jpg', title: 'Red Stools', meta: 'Haikou, 2025 · iPhone', desc: 'Plastic chairs, old walls, and a lunch crowd that never left.', orient: 'v', date: '2025-02' },
  { url: 'photos/web/IMG_1495.jpg', title: 'Cable Bridge', meta: 'Haikou, 2025 · iPhone', desc: 'The bridge at dusk, cables fanning out like a harp.', orient: 'h', date: '2025-02' },
  // 2025-01
  { url: 'photos/web/DSCF4749.jpg', title: 'Intersection', meta: 'Tokyo, 2025 · Fujifilm', desc: 'A delivery rider threads between a bus and a taxi.', orient: 'h', date: '2025-01' },
  { url: 'photos/web/DSCF4527.jpg', title: 'The Cook', meta: 'Japan, 2025 · Fujifilm', desc: 'Wooden bowls, hung spoons, and a quiet man behind the counter.', orient: 'h', date: '2025-01' },
  { url: 'photos/web/DSC00875.jpg', title: 'Waiting', meta: 'China, 2025 · Sony', desc: 'A man sits between two electrical boxes like a portrait.', orient: 'h', date: '2025-01' },
  { url: 'photos/web/DSC00853.jpg', title: 'Passage', meta: 'China, 2025 · Sony', desc: 'Figures move through the covered walkway, umbrellas folded.', orient: 'h', date: '2025-01' },
  // 2024-12
  { url: 'photos/web/IMG_1452.jpg', title: 'Poster Wall', meta: 'Shanghai, 2024 · iPhone', desc: 'Workers chat in front of a wall of design posters.', orient: 'h', date: '2024-12' },
  { url: 'photos/web/IMG_1453.jpg', title: 'Café Window', meta: 'Shanghai, 2024 · iPhone', desc: 'Polka dots on glass, a man scrolls through his phone.', orient: 'h', date: '2024-12' },
  { url: 'photos/web/DSC00643.jpg', title: 'Dusk', meta: 'China, 2024 · Sony', desc: 'The city softens. Everything turns the same shade of blue.', orient: 'h', date: '2024-12' },
  { url: 'photos/web/DSC00375.jpg', title: 'Fog Season', meta: 'China, 2024 · Sony', desc: 'Trees vanish into the mist. Depth becomes a guess.', orient: 'h', date: '2024-12' },
  { url: 'photos/web/DSC00208.jpg', title: 'Night Walk', meta: 'China, 2024 · Sony', desc: 'Street lights draw long shadows. The city is still awake.', orient: 'h', date: '2024-12' }
];

const container = document.getElementById('coverflow');
const total = photos.length;
let current = 0;

// ─── Build covers ───
photos.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'cover orient-' + (p.orient || 'v');
  el.dataset.index = i;
  el.innerHTML = `
    <div class="cover-img-wrap">
      <img src="${p.url}" alt="${p.title}" loading="lazy" draggable="false">
    </div>
    <div class="cover-reflection">
      <img src="${p.url}" alt="" loading="lazy" draggable="false">
    </div>
  `;
  el.addEventListener('click', () => goTo(i));
  container.appendChild(el);
});

const covers = document.querySelectorAll('.cover');

// ─── Core Coverflow layout ───
// Center cover: face-on, z-index high
// Left covers: rotateY(+55deg), shifted left, stacked
// Right covers: rotateY(-55deg), shifted right, stacked
const TILT = 75;          // degrees
const SPACING = 28;       // px between stacked covers (tight stack)
const CENTER_GAP = 520;   // px gap — push sides to page edges
const Z_STEP = 40;        // z offset per step

function layout() {
  covers.forEach((cover, i) => {
    const offset = i - current;
    let tx, ry, tz, zi;
    const absOff = Math.abs(offset);

    if (offset === 0) {
      tx = 0; ry = 0; tz = 0;
      zi = total;
      // Restore original orientation class
      cover.style.width = '';
      cover.style.height = '';
      cover.style.marginLeft = '';
      cover.style.marginTop = '';
    } else {
      // Side cards: same height as center, fixed width
      const isMobile = window.innerWidth <= 768;
      cover.style.height = isMobile ? '50vh' : '60vh';
      cover.style.width = isMobile ? '120px' : '220px';
      cover.style.marginLeft = isMobile ? '-60px' : '-110px';
      cover.style.marginTop = isMobile ? '-28vh' : '-33vh';

      const gap = window.innerWidth * (isMobile ? 0.42 : 0.3);

      if (offset < 0) {
        tx = -gap + (offset + 1) * SPACING;
        ry = TILT;
        tz = 0;
        zi = total + offset;
      } else {
        tx = gap + (offset - 1) * SPACING;
        ry = -TILT;
        tz = 0;
        zi = total - offset;
      }
    }

    cover.style.transform = `translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg)`;
    cover.style.zIndex = zi;

    // Show up to 6 on each side (3 on mobile)
    const maxSide = window.innerWidth <= 768 ? 3 : 6;
    if (absOff > maxSide) {
      cover.style.opacity = '0';
    } else {
      cover.style.opacity = '1';
    }

    // Toggle glass mode for non-center cards
    const imgWrap = cover.querySelector('.cover-img-wrap');
    const reflection = cover.querySelector('.cover-reflection');
    if (offset === 0) {
      imgWrap.classList.remove('glass');
      if (reflection) reflection.style.display = '';
      cover.style.filter = 'brightness(1)';
    } else {
      imgWrap.classList.add('glass');
      if (reflection) reflection.style.display = 'none';
      cover.style.filter = 'brightness(1)';
    }

    cover.classList.toggle('active', offset === 0);
  });

  // Update info
  const p = photos[current];
  const title = document.getElementById('infoTitle');
  const meta = document.getElementById('infoMeta');
  const desc = document.getElementById('infoDesc');

  title.classList.remove('show');
  meta.classList.remove('show');
  desc.classList.remove('show');

  setTimeout(() => {
    title.textContent = p.title;
    meta.textContent = p.meta;
    desc.textContent = p.desc;
    title.classList.add('show');
    meta.classList.add('show');
    desc.classList.add('show');
  }, 150);

  // Counter
  document.getElementById('counter').textContent =
    `${String(current + 1).padStart(2, '0')} — ${String(total).padStart(2, '0')}`;

  // Track
  const pct = current / (total - 1);
  document.getElementById('trackFill').style.width = `${pct * 100}%`;
  document.getElementById('trackThumb').style.left = `calc(${pct * 100}% - 5px)`;
}

function goTo(i) {
  current = Math.max(0, Math.min(total - 1, i));
  layout();
}

// ─── Controls ───

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
});

// Wheel
let wheelCd = false;
document.addEventListener('wheel', e => {
  if (wheelCd) return;
  wheelCd = true;
  setTimeout(() => wheelCd = false, 250);
  e.deltaY > 0 || e.deltaX > 0 ? goTo(current + 1) : goTo(current - 1);
}, { passive: true });

// Touch swipe
let tx0 = 0;
document.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  if (Math.abs(dx) > 40) dx > 0 ? goTo(current - 1) : goTo(current + 1);
}, { passive: true });

// Track click
document.getElementById('track').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  goTo(Math.round(pct * (total - 1)));
});

// Track drag
let dragging = false;
const thumb = document.getElementById('trackThumb');
thumb.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = document.getElementById('track').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  goTo(Math.round(pct * (total - 1)));
});
document.addEventListener('mouseup', () => { dragging = false; });

// ─── Year ticks on track ───
function buildTicks() {
  const ticksEl = document.querySelector('.track-ticks') || (() => {
    const el = document.createElement('div');
    el.className = 'track-ticks';
    document.getElementById('track').appendChild(el);
    return el;
  })();
  ticksEl.innerHTML = '';

  // Find where each year starts
  const seen = {};
  photos.forEach((p, i) => {
    const year = p.date.split('-')[0];
    if (!seen[year]) {
      seen[year] = i;
    }
  });

  Object.entries(seen).forEach(([year, idx]) => {
    const pct = idx / (photos.length - 1) * 100;
    const tick = document.createElement('div');
    tick.className = 'track-tick';
    tick.style.left = pct + '%';
    tick.innerHTML = `<span class="track-tick-label">${year}</span>`;
    ticksEl.appendChild(tick);
  });
}
buildTicks();

// Recalc on resize
window.addEventListener('resize', () => layout());

// ─── Init ───
layout();
</script>

</body>
</html>

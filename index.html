<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wayne — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'Space Mono', monospace;
      --desk: #2a2420;
      --paper: #f5f0e8;
      --shadow: rgba(0,0,0,0.4);
    }

    body {
      background: var(--desk);
      overflow: hidden;
      cursor: grab;
      font-family: var(--mono);
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    /* subtle wood grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 3px,
          rgba(255,255,255,0.01) 3px,
          rgba(255,255,255,0.01) 4px
        );
      pointer-events: none;
      z-index: 0;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
    }

    .photo {
      position: absolute;
      background: var(--paper);
      padding: 12px 12px 40px 12px;
      box-shadow: 
        0 2px 8px var(--shadow),
        0 0 1px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.35s ease,
                  z-index 0s;
      transform-style: preserve-3d;
      perspective: 800px;
    }

    .photo:hover {
      box-shadow: 
        0 12px 40px rgba(0,0,0,0.5),
        0 0 1px rgba(0,0,0,0.2);
      z-index: 9000 !important;
    }

    .photo .front,
    .photo .back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .photo .front {
      display: block;
    }

    .photo .back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--paper);
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-align: center;
    }

    .photo.flipped {
      transform: rotateY(180deg) !important;
    }

    .photo img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    .photo .label {
      position: absolute;
      bottom: 10px;
      left: 12px;
      right: 12px;
      font-family: var(--mono);
      font-size: 9px;
      color: #999;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .back .title {
      font-family: var(--serif);
      font-size: 22px;
      color: #1a1a1a;
      margin-bottom: 8px;
      font-style: italic;
    }

    .back .meta {
      font-family: var(--mono);
      font-size: 10px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .back .desc {
      font-family: var(--serif);
      font-size: 14px;
      color: #444;
      line-height: 1.6;
      max-width: 200px;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #lightbox.active {
      display: flex;
      opacity: 1;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }

    #lightbox .info {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #fff;
    }

    #lightbox .info .title {
      font-family: var(--serif);
      font-size: 28px;
      font-style: italic;
      margin-bottom: 6px;
    }

    #lightbox .info .meta {
      font-family: var(--mono);
      font-size: 11px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #lightbox .info .desc {
      font-family: var(--serif);
      font-size: 15px;
      color: #aaa;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* Minimap */
    #minimap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 160px;
      height: 100px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      z-index: 9999;
      overflow: hidden;
    }

    #minimap .viewport {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }

    #minimap .dot {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
    }

    /* Hint */
    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 1s ease;
      z-index: 9998;
    }

    @media (max-width: 768px) {
      .photo {
        padding: 8px 8px 30px 8px;
      }
      .photo .label {
        font-size: 7px;
        bottom: 8px;
        left: 8px;
      }
      #minimap {
        width: 100px;
        height: 62px;
        bottom: 12px;
        right: 12px;
      }
      #hint {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>

<div id="canvas"></div>

<div id="lightbox" onclick="closeLightbox()">

  <div class="info">
    <div class="title" id="lb-title"></div>
    <div class="meta" id="lb-meta"></div>
    <div class="desc" id="lb-desc"></div>
  </div>
</div>

<div id="minimap">
  <div class="viewport" id="mm-viewport"></div>
</div>

<div id="hint">drag to explore · click to view</div>

// --- Layout: scatter photos on a large canvas ---
const PHOTO_W_H = 240;  // horizontal photo width
const PHOTO_W_V = 170;  // vertical photo width
const COLS = Math.ceil(Math.sqrt(photos.length * 1.8));
const CELL = 200;  // tight grid = heavy overlap
const CANVAS_W = COLS * CELL + 400;
const CANVAS_H = Math.ceil(photos.length / COLS) * CELL + 400;
const canvas = document.getElementById('canvas');
canvas.style.width = CANVAS_W + 'px';
canvas.style.height = CANVAS_H + 'px';

// Seeded random for consistent layout
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return s / 2147483647;
  };
}
const rand = seededRandom(42);

// Shuffle photos for visual variety
const shuffled = [...photos].sort(() => rand() - 0.5);

shuffled.forEach((p, i) => {
  const col = i % COLS;
  const row = Math.floor(i / COLS);
  const w = p.orient === 'v' ? PHOTO_W_V : PHOTO_W_H;
  const rotation = (rand() - 0.5) * 30; // ±15°
  const offsetX = (rand() - 0.5) * 140;
  const offsetY = (rand() - 0.5) * 140;
  const x = 200 + col * CELL + offsetX;
  const y = 200 + row * CELL + offsetY;
  const z = Math.floor(rand() * 100);

  const el = document.createElement('div');
  el.className = 'photo';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = w + 'px';
  el.style.zIndex = z;
  el.style.transform = `rotate(${rotation}deg)`;
  el.dataset.rotation = rotation;
  el.dataset.idx = i;

  el.innerHTML = `
    <div class="front">
      <img src="${p.url}" alt="${p.title}" loading="lazy">
      <div class="label">${p.title} — ${p.meta}</div>
    </div>
  `;

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    openLightbox(photos.indexOf(p));
  });

  // Bring to front on hover
  let hoverZ = 9000;
  el.addEventListener('mouseenter', () => {
    hoverZ++;
    el.style.zIndex = hoverZ;
    el.style.transform = `rotate(0deg) scale(1.15) translateY(-8px)`;
    el.style.boxShadow = '0 20px 60px rgba(0,0,0,0.6), 0 0 1px rgba(0,0,0,0.2)';
  });
  el.addEventListener('mouseleave', () => {
    el.style.zIndex = hoverZ; // stays on top once touched
    el.style.transform = `rotate(${rotation}deg)`;
    el.style.boxShadow = '';
  });

  canvas.appendChild(el);
});

// --- Pan (drag to explore) ---
let isPanning = false;
let startX, startY, panX = 0, panY = 0;

// Center the view initially
const vw = window.innerWidth;
const vh = window.innerHeight;
panX = -(CANVAS_W / 2 - vw / 2);
panY = -(CANVAS_H / 2 - vh / 2);
canvas.style.transform = `translate(${panX}px, ${panY}px)`;

document.body.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.photo') || e.target.closest('#lightbox') || e.target.closest('#minimap')) return;
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
  document.body.style.cursor = 'grabbing';
});

document.body.addEventListener('pointermove', (e) => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  canvas.style.transform = `translate(${panX}px, ${panY}px)`;
  updateMinimap();

  // Hide hint on first drag
  const hint = document.getElementById('hint');
  if (hint) hint.style.opacity = '0';
});

document.body.addEventListener('pointerup', () => {
  isPanning = false;
  document.body.style.cursor = 'grab';
});

// Touch: also allow dragging from photos
let touchStart = null;
document.body.addEventListener('touchstart', (e) => {
  if (e.target.closest('#lightbox') || e.target.closest('#minimap')) return;
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, px: panX, py: panY };
  }
}, { passive: true });

document.body.addEventListener('touchmove', (e) => {
  if (!touchStart || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  // If moved enough, it's a pan not a tap
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
    touchStart.moved = true;
    panX = touchStart.px + dx;
    panY = touchStart.py + dy;
    canvas.style.transform = `translate(${panX}px, ${panY}px)`;
    updateMinimap();
    const hint = document.getElementById('hint');
    if (hint) hint.style.opacity = '0';
  }
}, { passive: true });

document.body.addEventListener('touchend', (e) => {
  if (touchStart && !touchStart.moved) {
    // It was a tap — find the photo under the tap
    const el = document.elementFromPoint(touchStart.x, touchStart.y);
    const photoEl = el && el.closest('.photo');
    if (photoEl) {
      const idx = parseInt(photoEl.dataset.idx);
      openLightbox(photos.indexOf(shuffled[idx]));
    }
  }
  touchStart = null;
});

// --- Lightbox ---
let currentLB = -1;

function openLightbox(idx) {
  currentLB = idx;
  const p = photos[idx];
  const lb = document.getElementById('lightbox');
  document.getElementById('lb-img').src = p.url;
  document.getElementById('lb-title').textContent = p.title;
  document.getElementById('lb-meta').textContent = p.meta;
  document.getElementById('lb-desc').textContent = p.desc;
  lb.style.display = 'flex';
  requestAnimationFrame(() => lb.classList.add('active'));
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('active');
  setTimeout(() => { lb.style.display = 'none'; }, 300);
  currentLB = -1;
}

// Arrow keys in lightbox
document.addEventListener('keydown', (e) => {
  if (currentLB < 0) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') {
    openLightbox((currentLB + 1) % photos.length);
  }
  if (e.key === 'ArrowLeft') {
    openLightbox((currentLB - 1 + photos.length) % photos.length);
  }
});

// --- Minimap ---
function updateMinimap() {
  const vp = document.getElementById('mm-viewport');
  const mm = document.getElementById('minimap');
  const mmW = mm.offsetWidth;
  const mmH = mm.offsetHeight;
  const scaleX = mmW / CANVAS_W;
  const scaleY = mmH / CANVAS_H;

  const vpW = vw * scaleX;
  const vpH = vh * scaleY;
  const vpX = -panX * scaleX;
  const vpY = -panY * scaleY;

  vp.style.left = vpX + 'px';
  vp.style.top = vpY + 'px';
  vp.style.width = vpW + 'px';
  vp.style.height = vpH + 'px';
}

// Draw dots on minimap
function initMinimap() {
  const mm = document.getElementById('minimap');
  const scaleX = mm.offsetWidth / CANVAS_W;
  const scaleY = mm.offsetHeight / CANVAS_H;

  document.querySelectorAll('.photo').forEach(el => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.left = (parseFloat(el.style.left) + 50) * scaleX + 'px';
    dot.style.top = (parseFloat(el.style.top) + 30) * scaleY + 'px';
    mm.appendChild(dot);
  });

  updateMinimap();
}

// Fade hint after 4s
setTimeout(() => {
  const hint = document.getElementById('hint');
  if (hint) hint.style.opacity = '0';
}, 4000);

initMinimap();
</script>
